<!doctype html>
<html lang="zh-CN"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>nuzzly — 管家</title>
<style>
:root {
  --bg: #F5F3F1;
  --card: #FFFFFF;
  --fg: #171717;
  --muted: #7B7B7B;
  --beige: #D7B593;
  --brown: #8B5E46;
  --green: #6C8A69;
  --border: rgba(0,0,0,.06);
  --shadow-card: 0 8px 30px rgba(0,0,0,.06);
  --shadow-btn: 0 4px 16px rgba(139,94,70,.18);
  --shadow-tab: 0 -4px 24px rgba(0,0,0,.06);
  --radius-card: 36px;
  --radius-btn: 999px;
  --radius-tab: 999px;
  --safe-top: env(safe-area-inset-top, 48px);
  --safe-bottom: env(safe-area-inset-bottom, 34px);
  --font-display: -apple-system, 'SF Pro Display', 'PingFang SC', system-ui, sans-serif;
  --font-body: -apple-system, 'SF Pro Text', 'PingFang SC', system-ui, sans-serif;
  --font-num: 'Inter', -apple-system, system-ui, sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  width:100%;height:100%;
  font-family:var(--font-body);
  background:var(--bg);
  color:var(--fg);
  -webkit-font-smoothing:antialiased;
  -webkit-tap-highlight-color:transparent;
  overscroll-behavior:none;
}
.app-shell{
  width:100%;
  height:100vh;height:100dvh;
  padding-top:var(--safe-top);
  padding-bottom:calc(88px + var(--safe-bottom));
  overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  position:relative;
  display:flex;flex-direction:column;
}

/* Header */
.header{position:relative;padding:20px 24px 0;z-index:1}
.header-row{display:flex;align-items:center;justify-content:space-between}
.avatar{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--beige),var(--brown));display:flex;align-items:center;justify-content:center;font-size:26px;box-shadow:0 2px 12px rgba(139,94,70,.12);flex-shrink:0;overflow:hidden}
.avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.header-actions{display:flex;gap:12px}
.action-circle{width:44px;height:44px;border-radius:50%;background:var(--card);box-shadow:var(--shadow-card);display:flex;align-items:center;justify-content:center;border:1px solid var(--border);cursor:pointer;transition:transform .2s}
.action-circle:active{transform:scale(.92)}
.action-circle svg{width:20px;height:20px;color:var(--fg)}
.page-title{margin-top:20px;font-family:var(--font-display);font-size:34px;font-weight:700;line-height:1.15;letter-spacing:-.02em}

/* Pet Strip */
.pet-strip{padding:20px 24px 0;display:flex;gap:16px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;z-index:1}
.pet-strip::-webkit-scrollbar{display:none}
.pet-card{flex-shrink:0;width:80px;display:flex;flex-direction:column;align-items:center;gap:8px}
.pet-avatar-lg{width:72px;height:72px;border-radius:28px;background:linear-gradient(160deg,rgba(215,181,147,.2),rgba(215,181,147,.08));display:flex;align-items:center;justify-content:center;font-size:36px;box-shadow:0 4px 16px rgba(0,0,0,.04);border:2px solid rgba(255,255,255,.8)}
.pet-name-sm{font-size:12px;color:var(--fg);font-weight:500;text-align:center;letter-spacing:.01em}

/* Chat Area */
.chat-area{flex:1;display:flex;flex-direction:column;padding:20px 24px 0;gap:16px;z-index:1;min-height:0;background:var(--card);border-radius:36px 36px 0 0;margin-bottom:-120px;padding-bottom:140px}

/* AI Welcome */
.ai-welcome{display:flex;gap:12px;align-items:flex-start}
.ai-avatar{width:44px;height:44px;border-radius:16px;background:var(--brown);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:var(--shadow-btn);overflow:hidden}
.ai-avatar img{width:100%;height:100%;object-fit:cover;display:block}
.ai-avatar svg{width:24px;height:24px;color:#fff}
.ai-bubble{background:var(--card);border-radius:24px;border-top-left-radius:4px;padding:16px 20px;box-shadow:var(--shadow-card);border:1px solid var(--border);max-width:80%}
.ai-bubble p{font-size:15px;line-height:1.6;color:var(--fg)}
.ai-bubble .ai-name{font-size:12px;color:var(--muted);margin-bottom:4px;letter-spacing:.02em}

/* Quick Prompts */
.quick-prompts{display:flex;flex-wrap:wrap;gap:10px;padding:0 56px}
.prompt-chip{padding:10px 18px;border-radius:var(--radius-btn);background:var(--card);border:1px solid var(--border);font-size:13px;color:var(--fg);cursor:pointer;transition:all .2s;box-shadow:0 2px 8px rgba(0,0,0,.03);letter-spacing:.01em}
.prompt-chip:active{background:var(--brown);color:#fff;border-color:var(--brown);transform:scale(.96)}

/* Chat messages */
.chat-messages{flex:1;display:flex;flex-direction:column;gap:12px;overflow-y:auto;padding-bottom:8px;min-height:0}
.msg-row{display:flex;gap:10px;align-items:flex-end}
.msg-row.user{flex-direction:row-reverse}
.msg-bubble{padding:14px 18px;border-radius:20px;font-size:14px;line-height:1.55;max-width:75%;word-break:break-word}
.msg-bubble.ai{background:var(--card);border:1px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,.03);border-bottom-left-radius:4px;color:var(--fg)}
.msg-bubble.user{background:var(--brown);color:#fff;border-bottom-right-radius:4px;box-shadow:var(--shadow-btn)}
.msg-time{font-size:11px;color:var(--muted);margin-top:4px;padding:0 4px}
.msg-row.user .msg-time{text-align:right}

/* Input Bar */
.input-bar{padding:12px 24px calc(12px + var(--safe-bottom));z-index:2;background:transparent}
.input-wrap{display:flex;align-items:center;gap:10px;background:transparent;border-radius:var(--radius-btn);border:1px solid var(--border);padding:6px 6px 6px 20px}
.input-field{flex:1;border:none;outline:none;font-size:15px;font-family:var(--font-body);color:var(--fg);background:transparent;min-height:36px;line-height:1.4}
.input-field::placeholder{color:var(--muted)}
.send-btn{width:40px;height:40px;border-radius:50%;background:var(--brown);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .15s;flex-shrink:0}
.send-btn:active{transform:scale(.9)}
.send-btn svg{width:18px;height:18px;color:#fff}
.send-btn:disabled{opacity:.4;cursor:default}

/* Typing indicator */
.typing-indicator{display:flex;gap:4px;padding:8px 4px}
.typing-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:typingBounce 1.2s ease-in-out infinite}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes typingBounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.anim-fade-up{opacity:0;animation:fadeUp .6s cubic-bezier(.22,1,.36,1) forwards}
.anim-delay-1{animation-delay:.1s}
.anim-delay-2{animation-delay:.2s}
.anim-delay-3{animation-delay:.3s}

.status-bar-spacer{height:12px}

/* Tab Bar */
.tab-bar.ignore-vw{position:fixed;bottom:0;left:50%;transform:translateX(-50%);margin-bottom:20px;width:405px;height:51px;background:rgba(255,255,255,.82);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border-radius:var(--radius-tab);box-shadow:var(--shadow-tab),0 4px 20px rgba(0,0,0,.04);border:1px solid rgba(255,255,255,.6);display:flex;align-items:center;justify-content:space-around;z-index:100;padding:0}
.tab-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:8px 16px;border-radius:20px;transition:all .2s;position:relative;-webkit-tap-highlight-color:transparent}
.tab-item svg{width:24px;height:24px;color:var(--muted);transition:color .2s}
.tab-item img{width:24px;height:24px;object-fit:contain;display:block}
.tab-item span{font-size:10px;color:var(--muted);font-weight:500;letter-spacing:.02em;transition:color .2s}
.tab-item.active svg{color:var(--brown)}
.tab-item.active span{color:var(--brown);font-weight:600}
.tab-item.active::after{content:'';position:absolute;top:-2px;width:6px;height:6px;border-radius:50%;background:var(--brown)}
.tab-center{margin-top:-28px}
.tab-center-btn{width:56px;height:56px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .2s}
#tabCommunity>.tab-logo{width:60px;height:60px}
.tab-center-btn:active{transform:scale(.9)}
.tab-center-btn svg{width:24px;height:24px;color:#fff}
</style>
</head>

<script>
(function(){
  'use strict';

  var input = document.getElementById('chatInput');
  var sendBtn = document.getElementById('sendBtn');
  var chatMessages = document.getElementById('chatMessages');
  var chatArea = document.getElementById('chatArea');
  var welcomeContent = document.getElementById('welcomeContent');
  var welcomeHidden = false;

  // AI responses database
  var aiResponses = {
    '健康': '毛毛今天的健康评分为 96 分，整体状态非常好！体温、食欲和精神状态都正常。建议继续保持目前的饮食和运动习惯 🩺',
    '猫粮': '根据毛毛的年龄和体重，推荐以下猫粮：\n\n1. **渴望鸡肉猫粮** — 高蛋白低碳水，适合成年猫\n2. **GO! 九种肉** — 多种肉类配方，营养均衡\n3. **纽翠斯黑钻** — 含冻干涂层，适口性好\n\n建议每日喂食量 40-50g，分 2-3 次喂食 🍖',
    '疫苗': '已为您查看最近可预约的疫苗接种时间：\n\n📅 **本周六 上午 10:00**\n🏥 毛球镇合作宠物医院\n💉 猫三联 + 狂犬疫苗\n\n需要帮您预约这个时间段吗？',
    '体重': '毛毛近 30 天体重变化趋势：\n\n📊 当前体重：4.8kg\n📈 较上月：+0.1kg\n✅ 处于健康范围内\n\n建议每周定期称重记录，我可以帮您设置提醒 ⚖️'
  };

  // Enable/disable send button
  input.addEventListener('input', function(){
    sendBtn.disabled = !input.value.trim();
  });

  // Send message
  function sendMessage(text){
    if (!text || !text.trim()) return;
    text = text.trim();

    // Hide welcome content on first message
    if (!welcomeHidden && welcomeContent){
      welcomeContent.style.display = 'none';
      welcomeHidden = true;
    }

    // Add user message
    appendMessage('user', text);
    input.value = '';
    sendBtn.disabled = true;

    // Show typing indicator
    var typingEl = showTyping();

    // Simulate AI response delay
    var delay = 800 + Math.random() * 1200;
    setTimeout(function(){
      typingEl.remove();
      var response = getAIResponse(text);
      appendMessage('ai', response);
      scrollToBottom();
    }, delay);
  }

  // Get AI response
  function getAIResponse(text){
    for (var key in aiResponses){
      if (text.indexOf(key) !== -1) return aiResponses[key];
    }
    return '收到！关于「' + text + '」，让我为您查一下…\n\n目前我可以帮您：\n• 🩺 查看宠物健康状况\n• 🍖 推荐饮食方案\n• 💉 预约医疗服务\n• 📊 查看成长数据\n\n请告诉我您需要哪方面的帮助～';
  }

  // Append message to chat
  function appendMessage(type, text){
    var row = document.createElement('div');
    row.className = 'msg-row ' + type;

    var bubble = document.createElement('div');
    bubble.className = 'msg-bubble ' + type;
    bubble.innerHTML = text.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

    row.appendChild(bubble);
    chatMessages.appendChild(row);
    scrollToBottom();
  }

  // Show typing indicator
  function showTyping(){
    var row = document.createElement('div');
    row.className = 'msg-row ai';
    row.innerHTML = '<div class="ai-avatar" style="width:32px;height:32px;border-radius:12px;background:var(--brown);display:flex;align-items:center;justify-content:center"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 3l1.9 5.4a2 2 0 0 0 1.3 1.3L21 12l-5.8 2.3a2 2 0 0 0-1.3 1.3L12 21l-1.9-5.4a2 2 0 0 0-1.3-1.3L3 12l5.8-2.3a2 2 0 0 0 1.3-1.3z"/><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M5 3v4M3 5h4M19 17v4M17 19h4"/></svg></div><div class="msg-bubble ai"><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>';
    chatMessages.appendChild(row);
    scrollToBottom();
    return row;
  }

  // Scroll to bottom
  function scrollToBottom(){
    requestAnimationFrame(function(){
      chatArea.scrollTop = chatArea.scrollHeight;
    });
  }

  // Event listeners
  sendBtn.addEventListener('click', function(){ sendMessage(input.value); });
  input.addEventListener('keydown', function(e){
    if (e.key === 'Enter' && !e.shiftKey){
      e.preventDefault();
      sendMessage(input.value);
    }
  });

  // Quick prompt chips
  document.querySelectorAll('.prompt-chip').forEach(function(chip){
    chip.addEventListener('click', function(){
      var prompt = chip.getAttribute('data-prompt') || chip.textContent;
      sendMessage(prompt);
    });
  });

  // Tab navigation
  var tabs = document.querySelectorAll('.tab-item');
  tabs.forEach(function(tab){
    tab.addEventListener('click', function(){
      var target = tab.getAttribute('data-tab');
      if (target === 'home') window.location.href = 'index.html';
      else if (target === 'profile') window.location.href = 'profile.html';
      else if (target === 'camera') openCamera();
      else {
        tabs.forEach(function(t){ t.classList.remove('active'); });
        tab.classList.add('active');
      }
    });
  });

  // openCamera placeholder
  if (typeof openCamera !== 'function') {
    window.openCamera = function(){
      alert('拍照记录功能开发中');
    };
  }

})();
</script>


</body></html>
