<!doctype html>
<html lang="zh-CN"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>nuzzly — 我的</title>
<style>
:root {
  --bg: #F5F3F1;
  --card: #FFFFFF;
  --fg: #171717;
  --muted: #7B7B7B;
  --beige: #D7B593;
  --brown: #8B5E46;
  --green: #6C8A69;
  --border: rgba(0,0,0,.06);
  --shadow-card: 0 8px 30px rgba(0,0,0,.06);
  --shadow-btn: 0 4px 16px rgba(139,94,70,.18);
  --shadow-tab: 0 -4px 24px rgba(0,0,0,.06);
  --radius-card: 36px;
  --radius-btn: 999px;
  --radius-tab: 999px;
  --safe-top: env(safe-area-inset-top, 48px);
  --safe-bottom: env(safe-area-inset-bottom, 34px);
  --font-display: -apple-system, 'SF Pro Display', 'PingFang SC', system-ui, sans-serif;
  --font-body: -apple-system, 'SF Pro Text', 'PingFang SC', system-ui, sans-serif;
  --font-num: 'Inter', -apple-system, system-ui, sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  width:100%;height:100%;
  font-family:var(--font-body);
  background:var(--bg);
  color:var(--fg);
  -webkit-font-smoothing:antialiased;
  -webkit-tap-highlight-color:transparent;
  overscroll-behavior:none;
}
.app-shell{
  width:100%;
  min-height:100vh;min-height:100dvh;
  padding-bottom:calc(88px + var(--safe-bottom));
  overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  position:relative;
}

/* ===== Hero Pet Image — 25% viewport ===== */
.hero-pet{
  width:100%;
  height:180px;
  overflow-x:auto;
  overflow-y:hidden;
  position:relative;
  display:flex;
  align-items:flex-end;
  justify-content:flex-start;
  gap:16px;
  padding:0 16px 36px;
  -webkit-overflow-scrolling:touch;
  scroll-snap-type:x mandatory;
  scrollbar-width:none;
}
.hero-pet::-webkit-scrollbar{display:none}
.hero-pet img{
  height:260px;
  width:auto;
  display:block;
  flex-shrink:0;
  scroll-snap-align:center;
}

/* ===== Profile Card ===== */
.profile-card{
  background:var(--card);
  border-radius:var(--radius-card) var(--radius-card) 0 0;
  margin-top:-36px;
  position:relative;
  z-index:1;
  padding-top:56px;
  padding-bottom:24px;
  min-height:calc(75vh - 88px);
}

/* ===== Avatar — overlaps card top ===== */
.profile-avatar{
  position:absolute;
  top:-44px;
  right:28px;
  width:100px;
  height:100px;
  border-radius:50%;
  border:4px solid var(--card);
  box-shadow:0 4px 16px rgba(0,0,0,.1);
  overflow:hidden;
  background:linear-gradient(135deg,var(--beige),var(--brown));
  display:flex;align-items:center;justify-content:center;
  z-index:2;
}
.profile-avatar img{
  width:100%;height:100%;object-fit:cover;
}

/* ===== User Info ===== */
.profile-info{
  padding:0 28px;
  padding-right:120px;
  display:flex;
  flex-direction:column;
  gap:4px;
}
.profile-username{
  font-family:var(--font-display);
  font-size:24px;
  font-weight:700;
  letter-spacing:-.02em;
  color:var(--fg);
  line-height:1.2;
}
.profile-id{
  font-size:13px;
  color:var(--muted);
  letter-spacing:.01em;
}

/* ===== Stats Row ===== */
.stats-row{
  display:flex;
  justify-content:space-around;
  padding:24px 28px 0;
}
.stat-item{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;
  cursor:pointer;
}
.stat-item:active{opacity:.7}
.stat-num{
  font-family:var(--font-num);
  font-size:20px;
  font-weight:600;
  line-height:1;
  letter-spacing:-.02em;
  color:var(--fg);
}
.stat-label{
  font-size:12px;
  color:var(--muted);
  letter-spacing:.01em;
}

/* ===== Action Buttons ===== */
.profile-actions{
  display:flex;
  gap:12px;
  padding:24px 28px 0;
}
.action-btn{
  flex:1;
  height:44px;
  border-radius:var(--radius-btn);
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  font-size:14px;
  font-weight:500;
  letter-spacing:.01em;
  cursor:pointer;
  transition:transform .15s,opacity .15s;
  border:none;
}
.action-btn:active{transform:scale(.96)}
.action-btn.primary{
  background:var(--brown);
  color:#fff;
  box-shadow:var(--shadow-btn);
}
.action-btn.secondary{
  background:var(--bg);
  color:var(--fg);
  border:1px solid var(--border);
}
.action-btn svg{width:16px;height:16px}

/* ===== Divider ===== */
.divider{
  height:1px;
  background:var(--border);
  margin:20px 28px 0;
}

/* ===== Content Placeholder ===== */
.profile-body{
  padding:20px 28px 0;
}
.profile-body-label{
  font-size:14px;
  color:var(--muted);
  text-align:center;
  padding:40px 0;
  letter-spacing:.02em;
}

/* ===== Animations ===== */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.anim-fade-up{opacity:0;animation:fadeUp .6s cubic-bezier(.22,1,.36,1) forwards}
.anim-delay-1{animation-delay:.1s}
.anim-delay-2{animation-delay:.2s}

/* ===== Tab Bar ===== */
.tab-bar.ignore-vw{position:fixed;bottom:0;left:50%;transform:translateX(-50%);margin-bottom:20px;width:405px;height:51px;background:rgba(255,255,255,.82);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border-radius:var(--radius-tab);box-shadow:var(--shadow-tab),0 4px 20px rgba(0,0,0,.04);border:1px solid rgba(255,255,255,.6);display:flex;align-items:center;justify-content:space-around;z-index:100;padding:0}
.tab-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:8px 16px;border-radius:20px;transition:all .2s;position:relative;-webkit-tap-highlight-color:transparent}
.tab-item svg{width:24px;height:24px;color:var(--muted);transition:color .2s}
.tab-item img{width:24px;height:24px;object-fit:contain;display:block}
.tab-item span{font-size:10px;color:var(--muted);font-weight:500;letter-spacing:.02em;transition:color .2s}
.tab-item.active svg{color:var(--brown)}
.tab-item.active span{color:var(--brown);font-weight:600}
.tab-item.active::after{content:'';position:absolute;top:-2px;width:6px;height:6px;border-radius:50%;background:var(--brown)}
.tab-center{margin-top:-28px}
.tab-center-btn{width:56px;height:56px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .2s}
#tabCommunity>.tab-logo{width:60px;height:60px}
.tab-center-btn:active{transform:scale(.9)}
.tab-center-btn svg{width:24px;height:24px;color:#fff}
</style>
</head>

        设置
      </button>
    </div>

    <div class="divider"></div>

<nav class="tab-bar ignore-vw" id="tabBar">

<script>
(function(){
  'use strict';
  var tabs = document.querySelectorAll('.tab-item');
  tabs.forEach(function(tab){
    tab.addEventListener('click', function(){
      var target = tab.getAttribute('data-tab');
      if (target === 'home') window.location.href = 'index.html';
      else if (target === 'butler') window.location.href = 'butler.html';
      else if (target === 'camera') openCamera();
      else {
        tabs.forEach(function(t){ t.classList.remove('active'); });
        tab.classList.add('active');
      }
    });
  });

  // openCamera placeholder
  if (typeof openCamera !== 'function') {
    window.openCamera = function(){
      alert('拍照记录功能开发中');
    };
  }

  // Edit profile button
  var editBtn = document.getElementById('editProfileBtn');
  if (editBtn) editBtn.addEventListener('click', function(){
    window.location.href = 'edit-profile.html';
  });

  // Settings button
  var settingsBtn = document.getElementById('settingsBtn');
  if (settingsBtn) settingsBtn.addEventListener('click', function(){
    window.location.href = 'settings.html';
  });

})();
</script>
