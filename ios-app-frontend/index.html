<!doctype html>
<html lang="zh-CN"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>nuzzly — 毛球镇</title>
<style>
/* ===== nuzzly iOS Homepage — Tokens ===== */
:root {
  --bg: #F5F3F1;
  --card: #FFFFFF;
  --fg: #171717;
  --muted: #7B7B7B;
  --beige: #D7B593;
  --brown: #8B5E46;
  --green: #6C8A69;
  --border: rgba(0,0,0,.06);
  --shadow-card: 0 8px 30px rgba(0,0,0,.06);
  --shadow-btn: 0 4px 16px rgba(139,94,70,.18);
  --shadow-tab: 0 -4px 24px rgba(0,0,0,.06);
  --radius-card: 36px;
  --radius-btn: 999px;
  --radius-tab: 999px;
  --safe-top: env(safe-area-inset-top, 48px);
  --safe-bottom: env(safe-area-inset-bottom, 34px);
  --font-display: -apple-system, 'SF Pro Display', 'PingFang SC', system-ui, sans-serif;
  --font-body: -apple-system, 'SF Pro Text', 'PingFang SC', system-ui, sans-serif;
  --font-num: 'Inter', -apple-system, system-ui, sans-serif;
}

/* ===== Reset ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  width:100%;height:100%;
  font-family:var(--font-body);
  background:var(--bg);
  color:var(--fg);
  -webkit-font-smoothing:antialiased;
  -webkit-tap-highlight-color:transparent;
  overscroll-behavior:none;
}

/* ===== Scroll container ===== */
.app-shell{
  width:100%;
  min-height:100vh;
  min-height:100dvh;
  padding-top:var(--safe-top);
  padding-bottom:calc(88px + var(--safe-bottom));
  overflow-y:auto;
  overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  position:relative;
}

/* ===== Watermark Logo ===== */
.watermark{
  position:fixed;
  top:12%;
  right:-10%;
  width:340px;
  height:340px;
  opacity:.035;
  pointer-events:none;
  z-index:0;
  background-repeat:no-repeat;
  background-size:contain;
  background-position:center;
}

/* ===== Header ===== */
.header{
  position:relative;
  padding:20px 24px 0;
  z-index:1;
}
.header-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.avatar{
  width:52px;height:52px;
  border-radius:50%;
  background:linear-gradient(135deg,var(--beige),var(--brown));
  display:flex;align-items:center;justify-content:center;
  font-size:26px;
  box-shadow:0 2px 12px rgba(139,94,70,.12);
  flex-shrink:0;
  overflow:hidden;
}
.avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.header-actions{
  display:flex;gap:12px;
}
.action-circle{
  width:44px;height:44px;
  border-radius:50%;
  background:var(--card);
  box-shadow:var(--shadow-card);
  display:flex;align-items:center;justify-content:center;
  border:1px solid var(--border);
  cursor:pointer;
  transition:transform .2s,box-shadow .2s;
}
.action-circle:active{transform:scale(.92)}
.action-circle svg{width:20px;height:20px;color:var(--fg)}

.greeting{
  margin-top:20px;
}
.greeting-sub{
  font-size:15px;
  color:var(--muted);
  font-weight:400;
  letter-spacing:.02em;
  margin-bottom:4px;
}
.greeting-main{
  font-family:var(--font-display);
  font-size:34px;
  font-weight:700;
  line-height:1.15;
  letter-spacing:-.02em;
  color:var(--fg);
}
.greeting-main .pet-name{
  color:var(--brown);
}

/* ===== Quick Actions ===== */
.quick-actions{
  display:flex;
  gap:16px;
  padding:24px 24px 0;
  position:relative;
  z-index:1;
}
.qa-btn{
  width:64px;height:64px;
  border-radius:50%;
  background:var(--card);
  box-shadow:var(--shadow-card);
  display:flex;align-items:center;justify-content:center;
  border:1px solid var(--border);
  cursor:pointer;
  transition:transform .2s,box-shadow .2s;
  flex-shrink:0;
  position:relative;
}
.qa-btn:active{transform:scale(.9)}
.qa-btn svg{width:26px;height:26px;color:var(--fg)}
.qa-btn.primary{
  background:var(--brown);
  border:none;
  box-shadow:var(--shadow-btn);
}
.qa-btn.primary svg{color:#fff}
.qa-btn .qa-label{
  position:absolute;
  bottom:-20px;
  font-size:11px;
  color:var(--muted);
  white-space:nowrap;
  letter-spacing:.01em;
}

/* ===== Hero Health Card ===== */
.hero-card{
  margin:36px 24px 0;
  background:var(--card);
  border-radius:var(--radius-card);
  box-shadow:var(--shadow-card);
  border:1px solid var(--border);
  padding:28px 28px 24px;
  display:flex;
  align-items:center;
  gap:20px;
  position:relative;
  z-index:1;
  overflow:visible;
  min-height:200px;
  width:calc(100% - 12.8vw);
}
.hero-left{
  flex:0 0 42%;
  display:flex;
  flex-direction:column;
  gap:12px;
}
.hero-tag{
  display:inline-flex;
  align-items:center;
  gap:6px;
  background:rgba(108,138,105,.1);
  color:var(--green);
  font-size:13px;
  font-weight:500;
  padding:5px 12px;
  border-radius:var(--radius-btn);
  width:fit-content;
  letter-spacing:.02em;
}
.hero-tag svg{width:14px;height:14px}
.hero-score{
  font-family:var(--font-num);
  font-size:56px;
  font-weight:600;
  line-height:1;
  letter-spacing:-.03em;
  color:var(--fg);
}
.hero-score-label{
  font-size:14px;
  color:var(--muted);
  margin-top:-4px;
}
.hero-cta{
  display:inline-flex;
  align-items:center;
  gap:8px;
  background:var(--brown);
  color:#fff;
  font-size:15px;
  font-weight:500;
  padding:14px 24px;
  border-radius:var(--radius-btn);
  box-shadow:var(--shadow-btn);
  border:none;
  cursor:pointer;
  width:fit-content;
  transition:transform .15s;
  letter-spacing:.01em;
}
.hero-cta:active{transform:scale(.96)}
.hero-cta svg{width:16px;height:16px}
.hero-right{
  flex:1;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  position:relative;
  min-height:0;
  padding-bottom:4px;
}
.hero-pet-img{
  max-width:100%;
  max-height:100%;
  width:auto;
  height:auto;
  object-fit:contain;
  object-position:center bottom;
  pointer-events:none;
  user-select:none;
  display:block;
  transform:scale(1.6);
  transform-origin:center bottom;
  position:relative;
  z-index:10;
}

/* ===== Dashboard Grid ===== */
.dashboard{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
  padding:28px 24px 0;
  position:relative;
  z-index:1;
}
.dash-card{
  background:var(--card);
  border-radius:var(--radius-card);
  box-shadow:var(--shadow-card);
  border:1px solid var(--border);
  padding:24px;
  width:155px;height:155px;
  display:flex;
  flex-direction:column;
  gap:8px;
  cursor:pointer;
  transition:transform .2s;
  position:relative;
  overflow:hidden;
}
.dash-card:active{transform:scale(.97)}
.dash-card.tall{grid-row:span 2}
.dash-card.accent-bg{background:rgba(215,181,147,.12)}
.dash-card.green-bg{background:rgba(108,138,105,.08)}
#cardAge{background-color:#ffffff}
#cardFeed{background-color:#ffffff}

.dash-icon{
  width:44px;height:44px;
  border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;
}
.dash-icon.brown{background:rgba(139,94,70,.1)}
.dash-icon.beige{background:rgba(215,181,147,.2)}
.dash-icon.green{background:rgba(108,138,105,.12)}
.dash-icon.gray{background:rgba(0,0,0,.04)}

.dash-value{
  font-family:var(--font-num);
  font-size:36px;
  font-weight:600;
  line-height:1.1;
  letter-spacing:-.02em;
  color:var(--fg);
}
.dash-unit{
  font-size:16px;
  font-weight:400;
  color:var(--muted);
  margin-left:2px;
}
.dash-label{
  font-size:14px;
  color:var(--muted);
  letter-spacing:.01em;
}
.dash-action{
  font-size:14px;
  color:var(--brown);
  font-weight:500;
  display:flex;align-items:center;gap:4px;
  margin-top:auto;
  letter-spacing:.01em;
}
.dash-action svg{width:14px;height:14px}

.dash-card.diary{
  justify-content:space-between;
}
.diary-title{
  font-family:var(--font-display);
  font-size:20px;
  font-weight:700;
  line-height:1.3;
  letter-spacing:-.01em;
}
.diary-desc{
  font-size:13px;
  color:var(--muted);
  line-height:1.5;
}
.diary-arrow{
  width:36px;height:36px;
  border-radius:50%;
  background:var(--brown);
  display:flex;align-items:center;justify-content:center;
  align-self:flex-end;
}
.diary-arrow svg{width:16px;height:16px;color:#fff}

/* ===== Bottom spacer ===== */
.bottom-spacer{
  height:40px;
}

/* ===== Floating Tab Bar ===== */
.tab-bar.ignore-vw{
  position:fixed;
  bottom:0;
  left:50%;
  transform:translateX(-50%);
  margin-bottom:20px;
  width:405px;
  height:51px;
  background:rgba(255,255,255,.82);
  backdrop-filter:blur(40px);
  -webkit-backdrop-filter:blur(40px);
  border-radius:var(--radius-tab);
  box-shadow:var(--shadow-tab),0 4px 20px rgba(0,0,0,.04);
  border:1px solid rgba(255,255,255,.6);
  display:flex;
  align-items:center;
  justify-content:space-around;
  z-index:100;
  padding:0;
}
.tab-item{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:3px;
  cursor:pointer;
  padding:8px 16px;
  border-radius:20px;
  transition:all .2s;
  position:relative;
  -webkit-tap-highlight-color:transparent;
}
.tab-item svg{width:24px;height:24px;color:var(--muted);transition:color .2s}
.tab-item img{width:24px;height:24px;object-fit:contain;display:block}
.tab-item span{font-size:10px;color:var(--muted);font-weight:500;letter-spacing:.02em;transition:color .2s}
.tab-item.active svg{color:var(--brown)}
.tab-item.active span{color:var(--brown);font-weight:600}
.tab-item.active::after{
  content:'';
  position:absolute;
  top:-2px;
  width:6px;height:6px;
  border-radius:50%;
  background:var(--brown);
}
.tab-center{
  margin-top:-28px;
}
.tab-center-btn{
  width:56px;height:56px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  transition:transform .2s;
}
#tabCommunity>.tab-logo{width:60px;height:60px}
.tab-center-btn:active{transform:scale(.9)}
.tab-center-btn svg{width:24px;height:24px;color:#fff}
.tab-center-btn img{width:32px;height:32px;object-fit:contain;display:block;border-radius:8px}

/* ===== Animations ===== */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(16px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes fadeIn{
  from{opacity:0}
  to{opacity:1}
}
@keyframes scaleIn{
  from{opacity:0;transform:scale(.92)}
  to{opacity:1;transform:scale(1)}
}
.anim-fade-up{
  opacity:0;
  animation:fadeUp .6s cubic-bezier(.22,1,.36,1) forwards;
}
.anim-delay-1{animation-delay:.1s}
.anim-delay-2{animation-delay:.2s}
.anim-delay-3{animation-delay:.3s}
.anim-delay-4{animation-delay:.4s}
.anim-delay-5{animation-delay:.5s}
.anim-delay-6{animation-delay:.6s}
.anim-scale-in{
  opacity:0;
  animation:scaleIn .5s cubic-bezier(.22,1,.36,1) forwards;
}

/* ===== Status bar spacer (visual only) ===== */
.status-bar-spacer{
  height:12px;
}
</style>
</head>

  </div>

  <!-- Hero Health Card -->

<script>
(function(){
  'use strict';

  // === Dynamic greeting based on time ===
  var hour = new Date().getHours();
  var sub = document.querySelector('.greeting-sub');
  if (sub) {
    if (hour < 6) sub.textContent = '夜深了 🌙';
    else if (hour < 11) sub.textContent = '早上好 ☀️';
    else if (hour < 14) sub.textContent = '中午好 🌤';
    else if (hour < 18) sub.textContent = '下午好 ☀️';
    else sub.textContent = '晚上好 🌙';
  }

  // === Watermark SVG ===
  var wm = document.getElementById('watermark');
  if (wm) {
    wm.innerHTML = '<svg viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg" width="340" height="120"><text x="50%" y="50%" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, system-ui, sans-serif" font-size="38" font-weight="700" fill="#171717" letter-spacing="-1">nuzzly</text></svg>';
    wm.style.opacity = '.035';
  }

  // === Tab bar interactions ===
  var tabs = document.querySelectorAll('.tab-item');
  tabs.forEach(function(tab){
    tab.addEventListener('click', function(){
      var target = tab.getAttribute('data-tab');
      if (target === 'camera') { openCamera(); return; }
      tabs.forEach(function(t){ t.classList.remove('active'); });
      tab.classList.add('active');
      // Haptic feedback (iOS)
      if (navigator.vibrate) navigator.vibrate(10);
    });
  });

  // === Card tap feedback ===
  var cards = document.querySelectorAll('.dash-card, .hero-card');
  cards.forEach(function(card){
    card.addEventListener('touchstart', function(){}, {passive:true});
  });

  // === Camera button pulse ===
  var camBtn = document.getElementById('tabCommunity');
  if (camBtn) {
    camBtn.addEventListener('click', function(){
      camBtn.style.transform = 'scale(.88)';
      setTimeout(function(){ camBtn.style.transform = ''; }, 150);
    });
  }

  // openCamera placeholder
  if (typeof openCamera !== 'function') {
    window.openCamera = function(){
      alert('拍照记录功能开发中');
    };
  }

  // === Score counter animation ===
  var scoreEl = document.querySelector('.hero-score');
  if (scoreEl) {
    var target = parseInt(scoreEl.textContent) || 96;
    scoreEl.textContent = '0';
    var start = 0;
    var duration = 1200;
    var startTime = null;
    function countUp(ts) {
      if (!startTime) startTime = ts;
      var progress = Math.min((ts - startTime) / duration, 1);
      var ease = 1 - Math.pow(1 - progress, 3);
      var current = Math.round(ease * target);
      scoreEl.textContent = current;
      if (progress < 1) requestAnimationFrame(countUp);
    }
    // Delay to sync with fade-in
    setTimeout(function(){ requestAnimationFrame(countUp); }, 500);
  }

  // === Scroll-driven header opacity ===
  var shell = document.getElementById('appShell');
  var header = document.querySelector('.header');
  if (shell && header) {
    shell.addEventListener('scroll', function(){
      var s = shell.scrollTop;
      var opacity = Math.max(0, 1 - s / 200);
      header.style.opacity = opacity;
      header.style.transform = 'translateY(' + (-s * .15) + 'px)';
    }, {passive:true});
  }

})();
</script>
