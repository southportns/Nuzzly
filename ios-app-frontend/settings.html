<!doctype html>
<html lang="zh-CN"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>nuzzly — 设置</title>
<style>
:root {
  --bg: #F2F2F7;
  --card: #FFFFFF;
  --fg: #000000;
  --muted: #8E8E93;
  --red: #FF3B30;
  --blue: #007AFF;
  --brown: #8B5E46;
  --sep: rgba(60,60,67,0.12);
  --radius: 10px;
  --safe-top: env(safe-area-inset-top, 44px);
  --safe-bottom: env(safe-area-inset-bottom, 34px);
  --font-body: -apple-system, 'SF Pro Text', 'PingFang SC', system-ui, sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  width:100%;height:100%;
  font-family:var(--font-body);
  background:var(--bg);
  color:var(--fg);
  -webkit-font-smoothing:antialiased;
  -webkit-tap-highlight-color:transparent;
  overscroll-behavior:none;
}
.app-shell{
  width:100%;
  min-height:100vh;min-height:100dvh;
  padding:0 16px;
  padding-bottom:calc(24px + var(--safe-bottom));
  overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  position:relative;
}

/* ===== Status Bar ===== */
.status-bar{
  height:44px;
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  padding:0 20px 8px;
  font-size:15px;
  font-weight:600;
  color:var(--fg);
  position:sticky;
  top:0;
  background:var(--bg);
  z-index:10;
}
.sb-time{font-variant-numeric:tabular-nums}
.sb-right{display:flex;align-items:center;gap:6px}
.sb-signal{display:flex;gap:2px;align-items:flex-end;height:12px}
.sb-bar{width:3px;border-radius:1px;background:var(--fg)}
.sb-bar:nth-child(1){height:4px}
.sb-bar:nth-child(2){height:6px}
.sb-bar:nth-child(3){height:8px}
.sb-bar:nth-child(4){height:11px}
.sb-wifi svg{width:16px;height:12px}
.sb-battery{
  width:25px;height:12px;
  border:1.5px solid var(--fg);
  border-radius:3px;
  position:relative;
  display:flex;align-items:center;padding:1.5px;
}
.sb-battery::after{
  content:'';position:absolute;right:-4px;top:3px;
  width:2px;height:5px;background:var(--fg);border-radius:0 1px 1px 0;
}
.sb-battery-fill{
  flex:1;height:100%;
  background:#34C759;
  border-radius:1.5px;
}
.sb-pct{font-size:12px;font-weight:500}

/* ===== Nav Bar ===== */
.nav-bar{
  height:44px;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}
.nav-back{
  position:absolute;
  left:-8px;
  width:44px;height:44px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  border:none;background:none;
}
.nav-back svg{width:24px;height:24px;color:var(--blue)}
.nav-title{
  font-size:17px;
  font-weight:600;
  color:var(--fg);
  letter-spacing:-.01em;
}

/* ===== Group ===== */
.settings-group{
  margin-top:35px;
}
.group-title{
  font-size:13px;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:.02em;
  padding:0 16px;
  margin-bottom:8px;
  font-weight:400;
}
.group-card{
  background:var(--card);
  border-radius:var(--radius);
  overflow:hidden;
}

/* ===== Cell ===== */
.cell{
  display:flex;
  align-items:center;
  height:44px;
  padding:0 16px;
  cursor:pointer;
  transition:background .1s;
  text-decoration:none;
  color:var(--fg);
}
.cell:active{background:rgba(0,0,0,.04)}
.cell+.cell{border-top:1px solid var(--sep)}
.cell-title{
  flex:1;
  font-size:17px;
  font-weight:400;
}
.chevron{
  flex-shrink:0;
  width:8px;height:14px;
  display:flex;align-items:center;
}
.chevron svg{width:8px;height:14px}

/* ===== Bottom Actions ===== */
.bottom-actions{
  margin-top:35px;
}
.action-btn{
  width:100%;
  height:50px;
  border-radius:var(--radius);
  background:var(--card);
  border:none;
  font-size:17px;
  font-weight:400;
  cursor:pointer;
  transition:background .1s;
  display:flex;align-items:center;justify-content:center;
}
.action-btn:active{background:rgba(0,0,0,.04)}
.action-btn+.action-btn{margin-top:10px}
.action-btn.danger{color:var(--red)}

/* ===== Agreement Links ===== */
.agreement{
  margin-top:25px;
  text-align:center;
  padding-bottom:20px;
}
.agreement a{
  font-size:13px;
  color:var(--blue);
  text-decoration:none;
  cursor:pointer;
}
.agreement a:active{opacity:.6}
.agreement-line{
  line-height:1.8;
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:8px;
}

/* ===== Tab Bar ===== */
.tab-bar.ignore-vw{position:fixed;bottom:0;left:50%;transform:translateX(-50%);margin-bottom:20px;width:405px;height:51px;background:rgba(255,255,255,.82);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border-radius:var(--radius-tab);box-shadow:var(--shadow-tab),0 4px 20px rgba(0,0,0,.04);border:1px solid rgba(255,255,255,.6);display:flex;align-items:center;justify-content:space-around;z-index:100;padding:0}
.tab-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:8px 16px;border-radius:20px;transition:all .2s;position:relative;-webkit-tap-highlight-color:transparent}
.tab-item svg{width:24px;height:24px;color:var(--muted);transition:color .2s}
.tab-item img{width:24px;height:24px;object-fit:contain;display:block}
.tab-item span{font-size:10px;color:var(--muted);font-weight:500;letter-spacing:.02em;transition:color .2s}
.tab-item.active svg{color:var(--brown)}
.tab-item.active span{color:var(--brown);font-weight:600}
.tab-item.active::after{content:'';position:absolute;top:-2px;width:6px;height:6px;border-radius:50%;background:var(--brown)}
.tab-center{margin-top:-28px}
.tab-center-btn{width:56px;height:56px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .2s}
#tabCommunity>.tab-logo{width:60px;height:60px}
.tab-center-btn:active{transform:scale(.9)}
.tab-center-btn svg{width:24px;height:24px;color:#fff}
.tab-center-btn img{width:32px;height:32px;object-fit:contain;display:block;border-radius:8px}
</style>
</head>
<body>

<div class="app-shell">

  <!-- Status Bar -->

    <button class="nav-back" id="backBtn" aria-label="返回">

  <section class="settings-group" style="margin-top: 25px;">

    </div>
  </section>

  <!-- Group 4: 内容与社交 -->
  <section class="settings-group" style="margin-top: 25px;">
    <h2 class="group-title">内容与社交</h2>
    <div class="group-card">
      <a class="cell"><span class="cell-title">我的内容</span><i class="chevron"><svg viewBox="0 0 8 14"><path d="M1 1l6 6-6 6" stroke="#C7C7CC" stroke-width="1.5" fill="none"></path></svg></i></a>
      <a class="cell"><span class="cell-title">互动管理</span><i class="chevron"><svg viewBox="0 0 8 14"><path d="M1 1l6 6-6 6" stroke="#C7C7CC" stroke-width="1.5" fill="none"></path></svg></i></a>
    </div>
  </section>

  <!-- Group 5: 帮助 -->
  <section class="settings-group" style="margin-top: 25px;">
    <h2 class="group-title">帮助</h2>
    <div class="group-card">
      <a class="cell"><span class="cell-title">帮助与客服</span><i class="chevron"><svg viewBox="0 0 8 14"><path d="M1 1l6 6-6 6" stroke="#C7C7CC" stroke-width="1.5" fill="none"></path></svg></i></a>
      <a class="cell"><span class="cell-title">意见反馈</span><i class="chevron"><svg viewBox="0 0 8 14"><path d="M1 1l6 6-6 6" stroke="#C7C7CC" stroke-width="1.5" fill="none"></path></svg></i></a>
    </div>
  </section>

  <!-- Group 6: 法律与关于 -->
  <section class="settings-group" style="margin-top: 25px;">
    <h2 class="group-title">法律与关于</h2>
    <div class="group-card">
      <a class="cell"><span class="cell-title">关于</span><i class="chevron"><svg viewBox="0 0 8 14"><path d="M1 1l6 6-6 6" stroke="#C7C7CC" stroke-width="1.5" fill="none"></path></svg></i></a>

  <!-- Bottom Actions -->
  <div class="bottom-actions" style="margin-top: 25px;">
    <button class="action-btn">切换账号</button>
    <button class="action-btn danger">退出登录</button>
  </div>

  <!-- Agreement Links -->
  <div class="agreement">

  </div>

</div>
