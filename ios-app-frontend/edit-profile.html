<!doctype html>
<html lang="zh-CN"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>nuzzly — 编辑资料</title>
<style>
:root {
  --bg: #F5F3F1;
  --card: #FFFFFF;
  --fg: #171717;
  --muted: #7B7B7B;
  --beige: #D7B593;
  --brown: #8B5E46;
  --green: #6C8A69;
  --border: rgba(0,0,0,.06);
  --shadow-card: 0 8px 30px rgba(0,0,0,.06);
  --shadow-btn: 0 4px 16px rgba(139,94,70,.18);
  --radius-card: 36px;
  --radius-btn: 999px;
  --safe-top: env(safe-area-inset-top, 48px);
  --safe-bottom: env(safe-area-inset-bottom, 34px);
  --font-display: -apple-system, 'SF Pro Display', 'PingFang SC', system-ui, sans-serif;
  --font-body: -apple-system, 'SF Pro Text', 'PingFang SC', system-ui, sans-serif;
  --font-num: 'Inter', -apple-system, system-ui, sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  width:100%;height:100%;
  font-family:var(--font-body);
  background:var(--bg);
  color:var(--fg);
  -webkit-font-smoothing:antialiased;
  -webkit-tap-highlight-color:transparent;
  overscroll-behavior:none;
}
.app-shell{
  width:100%;
  min-height:100vh;min-height:100dvh;
  padding-bottom:calc(88px + var(--safe-bottom));
  overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  position:relative;
}

/* ===== Back Bar ===== */
.back-bar{
  position:absolute;
  top:0;left:0;right:0;
  padding:calc(var(--safe-top) + 12px) 24px 12px;
  z-index:10;
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.back-btn{
  width:36px;height:36px;
  border-radius:50%;
  background:rgba(255,255,255,.7);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  display:flex;align-items:center;justify-content:center;
  border:none;cursor:pointer;
  transition:transform .15s;
}
.back-btn:active{transform:scale(.9)}
.back-btn svg{width:20px;height:20px;color:var(--fg)}
.back-title{
  font-family:var(--font-display);
  font-size:17px;
  font-weight:600;
  color:var(--fg);
  letter-spacing:-.01em;
}
.back-right{width:36px}

/* ===== Hero Pet Image ===== */
.hero-pet{
  width:100%;
  height:180px;
  background-size:contain;
  background-repeat:no-repeat;
  background-position:center;
  position:relative;
}
.hero-pet img{
  display:none;
}

/* ===== Profile Card ===== */
.profile-card{
  background:var(--card);
  border-radius:var(--radius-card) var(--radius-card) 0 0;
  margin-top:-36px;
  position:relative;
  z-index:1;
  padding-top:72px;
  padding-bottom:24px;
  min-height:calc(75vh - 88px);
}

/* ===== Avatar ===== */
.profile-avatar{
  position:absolute;
  top:-44px;
  right:28px;
  width:100px;
  height:100px;
  border-radius:50%;
  border:4px solid var(--card);
  box-shadow:0 4px 16px rgba(0,0,0,.1);
  overflow:hidden;
  background:linear-gradient(135deg,var(--beige),var(--brown));
  display:flex;align-items:center;justify-content:center;
  z-index:2;
}
.profile-avatar img{width:100%;height:100%;object-fit:cover}

/* ===== User Info ===== */
.profile-info{
  padding:0 28px;
  padding-right:144px;
  display:flex;
  flex-direction:column;
  gap:4px;
}
.profile-username{
  font-family:var(--font-display);
  font-size:24px;
  font-weight:700;
  letter-spacing:-.02em;
  color:var(--fg);
  line-height:1.2;
}
.profile-id{
  font-size:13px;
  color:var(--muted);
  letter-spacing:.01em;
}

/* ===== Edit Form ===== */
.edit-form{
  padding:24px 28px 0;
  display:flex;
  flex-direction:column;
  gap:0;
}
.form-group{
  padding:18px 0;
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:space-between;
  cursor:pointer;
  transition:background .15s;
}
.form-group:last-child{border-bottom:none}
.form-group:active{background:rgba(0,0,0,.02)}

.form-left{
  display:flex;
  flex-direction:column;
  gap:4px;
  flex:1;
  min-width:0;
}
.form-label{
  font-size:15px;
  font-weight:500;
  color:var(--fg);
  letter-spacing:.01em;
}
.form-value{
  font-size:13px;
  color:var(--muted);
  letter-spacing:.01em;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.form-arrow{
  flex-shrink:0;
  margin-left:12px;
}
.form-arrow svg{width:16px;height:16px;color:var(--muted)}

/* ===== Save Button ===== */
.save-area{
  padding:32px 28px 0;
}
.save-btn{
  width:100%;
  height:50px;
  border-radius:var(--radius-btn);
  background:var(--brown);
  color:#fff;
  font-size:16px;
  font-weight:600;
  letter-spacing:.01em;
  border:none;
  cursor:pointer;
  box-shadow:var(--shadow-btn);
  transition:transform .15s,opacity .15s;
}
.save-btn:active{transform:scale(.97);opacity:.9}

/* ===== Animations ===== */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.anim-fade-up{opacity:0;animation:fadeUp .6s cubic-bezier(.22,1,.36,1) forwards}
.anim-delay-1{animation-delay:.1s}
.anim-delay-2{animation-delay:.2s}

/* ===== Tab Bar ===== */
.tab-bar.ignore-vw{position:fixed;bottom:0;left:50%;transform:translateX(-50%);margin-bottom:20px;width:405px;height:51px;background:rgba(255,255,255,.82);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border-radius:var(--radius-tab);box-shadow:var(--shadow-tab),0 4px 20px rgba(0,0,0,.04);border:1px solid rgba(255,255,255,.6);display:flex;align-items:center;justify-content:space-around;z-index:100;padding:0}
.tab-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:8px 16px;border-radius:20px;transition:all .2s;position:relative;-webkit-tap-highlight-color:transparent}
.tab-item svg{width:24px;height:24px;color:var(--muted);transition:color .2s}
.tab-item img{width:24px;height:24px;object-fit:contain;display:block}
.tab-item span{font-size:10px;color:var(--muted);font-weight:500;letter-spacing:.02em;transition:color .2s}
.tab-item.active svg{color:var(--brown)}
.tab-item.active span{color:var(--brown);font-weight:600}
.tab-item.active::after{content:'';position:absolute;top:-2px;width:6px;height:6px;border-radius:50%;background:var(--brown)}
.tab-center{margin-top:-28px}
.tab-center-btn{width:56px;height:56px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .2s}
#tabCommunity>.tab-logo{width:60px;height:60px}
.tab-center-btn:active{transform:scale(.9)}
.tab-center-btn svg{width:24px;height:24px;color:#fff}
.tab-center-btn img{width:32px;height:32px;object-fit:contain;display:block;border-radius:8px}
</style>
</head>
<body>

<div class="app-shell">

  <!-- Back Bar -->
  <div class="back-bar">
    <button class="back-btn" id="backBtn" aria-label="返回" style="padding-top: 0px; padding-bottom: 0px; padding-right: 0px; margin: 11px 0px 0px -12px;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M15 18l-6-6 6-6"></path></svg>
    </button>
    
    <div class="back-right"></div>
  </div>

  <!-- Hero Pet Image -->
  <div class="hero-pet" style="height: 242px; background-image: url('nuzzly-zuhe.png');"></div>

  <!-- Profile Card -->
  <div class="profile-card anim-fade-up" style="height: 670px; padding-top: 40px; padding-bottom: 0px; margin-top: -25px;">

    <!-- Avatar -->
    <div class="profile-avatar">
      <img src="mqpyqgao-logo.png" alt="头像">
    </div>

    <!-- User Info -->
    <div class="profile-info">
      <div class="profile-username">毛毛妈</div>
      <div class="profile-id">ID: nuzzly_001</div>
    </div>

    <!-- Edit Form -->
    <div class="edit-form anim-fade-up anim-delay-1">
      <div class="form-group" data-field="name">
        <div class="form-left">
          <div class="form-label">名字</div>
          <div class="form-value">毛毛妈</div>
        </div>
        <div class="form-arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"></path></svg>
        </div>
      </div>

      <div class="form-group" data-field="account">
        <div class="form-left">
          <div class="form-label">账号</div>
          <div class="form-value">nuzzly_001</div>
        </div>
        <div class="form-arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"></path></svg>
        </div>
      </div>

      <div class="form-group" data-field="bio">
        <div class="form-left">
          <div class="form-label">主页介绍</div>
          <div class="form-value">家有两只英短，记录养宠日常 🐱</div>
        </div>
        <div class="form-arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"></path></svg>
        </div>
      </div>

      <div class="form-group" data-field="location">
        <div class="form-left">
          <div class="form-label">我的位置</div>
          <div class="form-value">广东省 · 深圳市</div>
        </div>
        <div class="form-arrow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"></path></svg>
        </div>
      </div>
    </div>

    <!-- Save Button -->
    <div class="save-area anim-fade-up anim-delay-2" style="height: 62px; padding-top: 8px; padding-right: 28px; margin-top: 15px;">
      <button class="save-btn" id="saveBtn">保存修改</button>
    </div>
  </div>
</div>

<script>
(function(){
  'use strict';

  // Back button
  document.getElementById('backBtn').addEventListener('click', function(){
    window.location.href = 'profile.html';
  });

  // Form field click — simple edit modal
  document.querySelectorAll('.form-group').forEach(function(group){
    group.addEventListener('click', function(){
      var field = group.getAttribute('data-field');
      var label = group.querySelector('.form-label').textContent;
      var current = group.querySelector('.form-value').textContent;
      var newVal = prompt('请输入' + label, current);
      if (newVal !== null && newVal.trim() !== ''){
        group.querySelector('.form-value').textContent = newVal.trim();
      }
    });
  });

  // Save button
  document.getElementById('saveBtn').addEventListener('click', function(){
    var btn = this;
    btn.textContent = '已保存 ✓';
    btn.style.background = 'var(--green)';
    setTimeout(function(){
      btn.textContent = '保存修改';
      btn.style.background = '';
      window.location.href = 'profile.html';
    }, 1200);
  });

})();
</script>

<!-- Tab Bar -->
<nav class="tab-bar ignore-vw" id="tabBar">
  <div class="tab-item" data-tab="home" onclick="window.location.href='index.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 21H7a4 4 0 0 1-4-4v-6.292a4 4 0 0 1 1.927-3.421l5-3.03a4 4 0 0 1 4.146 0l5 3.03A4 4 0 0 1 21 10.707V17a4 4 0 0 1-4 4m-8-4h6"/></svg>
    <span>首页</span>
  </div>
  <div class="tab-item" data-tab="camera" onclick="openCamera()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><g fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"><path d="M2 19V9a2 2 0 0 1 2-2h.5a2 2 0 0 0 1.6-.8l2.22-2.96A.6.6 0 0 1 8.8 3h6.4a.6.6 0 0 1 .48.24L17.9 6.2a2 2 0 0 0 1.6.8h.5a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2"/><path d="M12 17a4 4 0 1 0 0-8a4 4 0 0 0 0 8"/></g></svg>
    <span>记录</span>
  </div>
  <div class="tab-center">
    <div class="tab-center-btn" aria-label="毛球镇" id="tabCommunity" onclick="window.location.href='community.html'">
      <img src="svg/导航栏.png" alt="毛球镇" class="tab-logo">
    </div>
  </div>
  <div class="tab-item" data-tab="butler" onclick="window.location.href='butler.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 3l1.9 5.4a2 2 0 0 0 1.3 1.3L21 12l-5.8 2.3a2 2 0 0 0-1.3 1.3L12 21l-1.9-5.4a2 2 0 0 0-1.3-1.3L3 12l5.8-2.3a2 2 0 0 0 1.3-1.3z"/><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M5 3v4M3 5h4M19 17v4M17 19h4"/></svg>
    <span>管家</span>
  </div>
  <div class="tab-item active" data-tab="profile" onclick="window.location.href='profile.html'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><g fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" d="M7 18v-1a5 5 0 0 1 5-5v0a5 5 0 0 1 5 5v1"/><path stroke-linecap="round" stroke-linejoin="round" d="M12 12a3 3 0 1 0 0-6a3 3 0 0 0 0 6"/><circle cx="12" cy="12" r="10"/></g></svg>
    <span>我的</span>
  </div>
</nav>

<script>
if (typeof openCamera !== 'function') {
  window.openCamera = function(){
    alert('拍照记录功能开发中');
  };
}
</script>

</body></html>
