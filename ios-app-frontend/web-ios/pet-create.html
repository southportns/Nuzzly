<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1,user-scalable=no">
<title>宠物档案 - Nuzzly 毛球镇</title>
<link rel="stylesheet" href="css/common.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
<style>
.edit-shell{width:100%;min-height:100vh;min-height:100dvh;background:var(--bg)}
.status-bar-spacer{height:var(--safe-top)}
.header{position:relative;padding:0 16px;z-index:1}
.header-row{display:flex;align-items:center;justify-content:space-between}
.avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--beige),var(--brown));display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 2px 12px rgba(139,94,70,.12);flex-shrink:0;overflow:hidden}
.avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.header-actions{display:flex;gap:8px}
.action-circle{width:32px;height:32px;border-radius:50%;background:var(--card);box-shadow:var(--shadow-card);display:flex;align-items:center;justify-content:center;border:1px solid var(--border);cursor:pointer;transition:transform .2s,box-shadow .2s}
.action-circle:active{transform:scale(.92)}
.action-circle svg{width:16px;height:16px;color:var(--fg)}
.greeting{margin-top:4px}
.greeting-main{font-family:var(--font-display);font-size:22px;font-weight:700;line-height:1.2;letter-spacing:-.02em;color:var(--fg)}
.highlight{color:var(--brown);font-size:14px;font-weight:500}
.edit-body{padding:0 16px 24px}
.form-card{background:var(--card);border-radius:var(--radius-xl);box-shadow:var(--shadow-card);border:1px solid var(--border);padding:14px;margin-bottom:12px}
.avatar-upload{display:flex;justify-content:center;margin-bottom:12px}
.avatar-preview{width:72px;height:72px;border-radius:50%;overflow:hidden;position:relative;cursor:pointer;border:3px solid var(--brown)}
.avatar-preview img{width:100%;height:100%;object-fit:cover}
.avatar-placeholder{width:72px;height:72px;border-radius:50%;background:var(--bg);border:2px dashed var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;transition:border-color .2s}
.avatar-placeholder:active{border-color:var(--brown)}
.avatar-placeholder svg{width:20px;height:20px;color:var(--muted)}
.avatar-placeholder span{font-size:9px;color:var(--muted)}
.form-field{margin-bottom:12px}
.form-label{display:block;font-size:13px;font-weight:600;color:var(--fg);margin-bottom:6px}
.form-label .req{color:#FF3B30}
.form-input{width:100%;height:36px;border:1px solid var(--border);border-radius:8px;padding:0 10px;font-size:13px;font-family:var(--font-body);color:var(--fg);background:var(--bg);outline:none;transition:border-color .2s;box-sizing:border-box}
.form-input:focus{border-color:var(--brown)}
.chip-group{display:flex;flex-wrap:wrap;gap:8px}
.chip{padding:6px 14px;border-radius:var(--radius-btn);background:var(--bg);border:1px solid var(--border);font-size:13px;color:var(--fg);cursor:pointer;transition:all .2s}
.chip.active{background:var(--brown);color:#fff;border-color:var(--brown)}
.breed-input-wrap{position:relative}
.breed-dropdown{position:absolute;left:0;right:0;top:100%;margin-top:4px;background:rgba(255,255,255,.96);border:1px solid var(--border);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.1);z-index:50;overflow:hidden;max-height:160px;overflow-y:auto}
.breed-item{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;font-size:12px;color:var(--fg);cursor:pointer;transition:background .15s;border-bottom:1px solid rgba(0,0,0,.04)}
.breed-item:last-child{border-bottom:none}
.breed-item:active{background:rgba(139,94,70,.06)}
.breed-aliases{font-size:10px;color:var(--muted)}
.radio-group{display:flex;gap:14px}
.radio-item{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--fg);cursor:pointer}
.radio-item input{accent-color:var(--brown)}
.form-row{display:flex;gap:8px}
.form-row.three-col{gap:6px}
.age-input-wrap{flex:1;display:flex;align-items:center;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:0 8px;height:36px;transition:border-color .2s}
.age-input-wrap:focus-within{border-color:var(--brown)}
.age-input{flex:1;width:100%;border:none;background:none;font-size:13px;font-family:var(--font-body);color:var(--fg);outline:none;padding:0;text-align:center}
.age-input::placeholder{color:var(--muted)}
.age-unit{font-size:11px;color:var(--muted);margin-left:2px}
.date-input{width:100%;height:36px;border:1px solid var(--border);border-radius:8px;padding:0 10px;font-size:13px;font-family:var(--font-body);color:var(--fg);background:var(--bg);outline:none;transition:border-color .2s;box-sizing:border-box}
.date-input:focus{border-color:var(--brown)}
.section-title{font-size:13px;font-weight:600;color:var(--fg);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.section-divider{height:1px;background:var(--border);margin:12px 0}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0}
.toggle-label{font-size:13px;color:var(--fg)}
.toggle-switch{position:relative;width:44px;height:24px;cursor:pointer}
.toggle-switch input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:var(--border);border-radius:12px;transition:background .2s}
.toggle-slider::before{content:'';position:absolute;left:2px;top:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.toggle-switch input:checked+.toggle-slider{background:var(--brown)}
.toggle-switch input:checked+.toggle-slider::before{transform:translateX(20px)}
.quick-actions{display:flex;flex-direction:column;gap:8px}
.primary-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;height:42px;border-radius:var(--radius-btn);background:var(--brown);color:#fff;font-size:14px;font-weight:600;font-family:var(--font-body);border:none;cursor:pointer;box-shadow:var(--shadow-btn);transition:transform .15s,opacity .15s;letter-spacing:.01em}
.primary-btn:active{transform:scale(.97)}
.primary-btn:disabled{opacity:.5;cursor:default;transform:none}
.toast{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%) scale(.9);background:rgba(0,0,0,.78);color:#fff;padding:12px 20px;border-radius:12px;font-size:14px;z-index:9999;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;max-width:80%;text-align:center}
.toast.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.anim-fade-up{opacity:0;animation:fadeUp .6s cubic-bezier(.22,1,.36,1) forwards}
.anim-delay-1{animation-delay:.1s}.anim-delay-2{animation-delay:.2s}.anim-delay-3{animation-delay:.3s}
</style>
</head>
<body>
<div class="edit-shell">
  <div class="status-bar-spacer"></div>
  <header class="header anim-fade-up">
    <div class="header-row">
      <div class="avatar"><img src="assets/mqpyqgao-logo.png" alt="nuzzly logo"></div>
      <div class="header-actions">
        <button class="action-circle anim-fade-up anim-delay-1" aria-label="关闭" id="closeBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
    </div>
    <div class="greeting">
      <h1 class="greeting-main" id="greetingTitle">创建宠物档案<br><span class="highlight">记录你的毛孩子</span></h1>
    </div>
  </header>
  <div class="edit-body">
    <div class="form-card anim-fade-up anim-delay-2">
      <div class="avatar-upload" id="avatarUpload">
        <input type="file" id="fileInput" accept="image/*" style="display:none">
        <div class="avatar-placeholder" id="avatarPreviewWrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
          <span>添加头像</span>
        </div>
      </div>

      <div class="form-field">
        <label class="form-label">名字 <span class="req">*</span></label>
        <input id="f_name" class="form-input" placeholder="给宠物取个名字" maxlength="20">
      </div>

      <div class="form-field">
        <label class="form-label">家庭成员类型</label>
        <div class="chip-group" data-field="species" id="cg_species"></div>
      </div>

      <div class="form-field">
        <label class="form-label">品种</label>
        <div class="breed-input-wrap">
          <input id="f_breed" class="form-input" placeholder="搜索或输入品种，如 布偶">
          <div class="breed-dropdown" id="breedDropdown" style="display:none"></div>
        </div>
      </div>

      <div class="form-field">
        <label class="form-label">性别</label>
        <div class="radio-group">
          <label class="radio-item"><input type="radio" name="gender" value="male" checked><span>公</span></label>
          <label class="radio-item"><input type="radio" name="gender" value="female"><span>母</span></label>
        </div>
      </div>

      <div class="form-field">
        <label class="form-label">生日（选填）</label>
        <input id="f_birth_date" type="date" class="date-input">
      </div>

      <div class="form-field">
        <label class="form-label">年龄（选填）</label>
        <div class="form-row three-col">
          <div class="age-input-wrap"><input id="f_age_years" type="number" class="age-input" placeholder="0" min="0" max="30"><span class="age-unit">年</span></div>
          <div class="age-input-wrap"><input id="f_age_months" type="number" class="age-input" placeholder="0" min="0" max="11"><span class="age-unit">月</span></div>
          <div class="age-input-wrap"><input id="f_age_days" type="number" class="age-input" placeholder="0" min="0" max="30"><span class="age-unit">天</span></div>
        </div>
      </div>

      <div class="form-field">
        <label class="form-label">体重（kg）</label>
        <input id="f_weight_kg" type="number" class="form-input" step="0.1" min="0" placeholder="如：4.8">
      </div>

      <div class="form-field">
        <label class="form-label">是否绝育</label>
        <div class="radio-group">
          <label class="radio-item"><input type="radio" name="neutered" value="true"><span>已绝育</span></label>
          <label class="radio-item"><input type="radio" name="neutered" value="false" checked><span>未绝育</span></label>
        </div>
      </div>

      <div class="form-field">
        <label class="form-label">肠胃状况</label>
        <div class="chip-group" data-field="stomach_health" id="cg_stomach_health"></div>
      </div>

      <div class="form-field">
        <label class="form-label">来源</label>
        <div class="chip-group" data-field="pet_source" id="cg_pet_source"></div>
      </div>

      <div class="form-field">
        <label class="form-label">到家日期（选填）</label>
        <input id="f_home_date" type="date" class="date-input">
      </div>

      <div class="section-divider"></div>
      <div class="section-title">生活环境</div>

      <div class="form-field">
        <label class="form-label">室内外</label>
        <div class="chip-group" data-field="indoor_outdoor" id="cg_indoor_outdoor"></div>
      </div>

      <div class="form-field">
        <label class="form-label">活跃度</label>
        <div class="chip-group" data-field="activity_level" id="cg_activity_level"></div>
      </div>

      <div class="toggle-row">
        <span class="toggle-label">多宠家庭</span>
        <label class="toggle-switch"><input type="checkbox" id="f_multi_pet"><span class="toggle-slider"></span></label>
      </div>
      <div class="form-field" id="petCountField" style="display:none">
        <label class="form-label">宠物数量</label>
        <input id="f_pet_count" type="number" class="form-input" min="2" value="2">
      </div>

      <div class="toggle-row">
        <span class="toggle-label">家中有小孩</span>
        <label class="toggle-switch"><input type="checkbox" id="f_has_children"><span class="toggle-slider"></span></label>
      </div>
    </div>

    <div class="quick-actions anim-fade-up anim-delay-3">
      <button class="primary-btn" id="saveBtn">保存档案</button>
    </div>
  </div>
</div>
<div id="toast" class="toast"></div>
<script>
(function () {
  const sb = window.sb
  const D = window.NuzzlyData, A = window.NuzzlyApp
  const SPECIES = [{ value: 'cat', label: '喵' }, { value: 'dog', label: '汪' }]
  const STOMACH = [{ value: 'normal', label: '良好' }, { value: 'sensitive', label: '敏感' }, { value: 'very_sensitive', label: '极易敏感' }]
  const SOURCE = [{ value: 'purchased', label: '购买' }, { value: 'stray_adopted', label: '流浪收留' }, { value: 'home_raised', label: '家养自育' }, { value: 'wild_rescued', label: '野生救助' }, { value: 'other', label: '其他' }]
  const INDOOR = [{ value: 'indoor', label: '纯室内' }, { value: 'outdoor', label: '纯室外' }, { value: 'both', label: '都有' }]
  const ACTIVITY = [{ value: 'low', label: '低' }, { value: 'medium', label: '中' }, { value: 'high', label: '高' }]
  const params = new URLSearchParams(location.search)
  const editId = params.get('id')
  const editMode = !!editId

  const form = { name: '', species: 'cat', breed: '', gender: 'male', birth_date: '', age_years: '', age_months: '', age_days: '', weight_kg: '', neutered: false, stomach_health: 'normal', pet_source: 'other', home_date: '', photo_url: '' }
  const env = { indoor_outdoor: 'indoor', activity_level: 'medium', multi_pet_household: false, pet_count: 2, has_children: false }
  let avatarFile = null
  let breedCache = []

  function toast (msg, theme) { const el = document.getElementById('toast'); el.textContent = msg; el.className = 'toast show ' + (theme || 'success'); clearTimeout(window.__t); window.__t = setTimeout(() => { el.className = 'toast' }, 2000) }

  function renderChips (id, options, val) {
    document.getElementById(id).innerHTML = options.map(o => '<div class="chip' + (val === o.value ? ' active' : '') + '" data-val="' + o.value + '">' + o.label + '</div>').join('')
  }
  function bindChips (id, field, isEnv) {
    document.getElementById(id).addEventListener('click', e => {
      const c = e.target.closest('.chip'); if (!c) return
      const v = c.dataset.val
      if (isEnv) env[field] = v; else form[field] = v
      renderChips(id, CHIPS_MAP[id].opts, v)
    })
  }
  const CHIPS_MAP = { cg_species: { opts: SPECIES }, cg_stomach_health: { opts: STOMACH }, cg_pet_source: { opts: SOURCE }, cg_indoor_outdoor: { opts: INDOOR }, cg_activity_level: { opts: ACTIVITY } }
  function refreshAllChips () {
    renderChips('cg_species', SPECIES, form.species)
    renderChips('cg_stomach_health', STOMACH, form.stomach_health)
    renderChips('cg_pet_source', SOURCE, form.pet_source)
    renderChips('cg_indoor_outdoor', INDOOR, env.indoor_outdoor)
    renderChips('cg_activity_level', ACTIVITY, env.activity_level)
  }
  bindChips('cg_species', 'species'); bindChips('cg_stomach_health', 'stomach_health'); bindChips('cg_pet_source', 'pet_source')
  bindChips('cg_indoor_outdoor', 'indoor_outdoor', true); bindChips('cg_activity_level', 'activity_level', true)

  // species 切换重置品种
  document.getElementById('cg_species').addEventListener('click', () => { form.breed = ''; document.getElementById('f_breed').value = ''; loadBreeds(form.species) })

  // 品种搜索
  async function loadBreeds (species) {
    try {
      const { data } = await sb.from('breed_aliases').select('canonical,alias').eq('species', species).limit(500)
      const map = new Map()
      for (const row of data || []) { if (!map.has(row.canonical)) map.set(row.canonical, { canonical: row.canonical, aliases: [] }); if (row.alias && !map.get(row.canonical).aliases.includes(row.alias)) map.get(row.canonical).aliases.push(row.alias) }
      breedCache = Array.from(map.values())
    } catch (e) { breedCache = [] }
  }
  const breedInput = document.getElementById('f_breed')
  const breedDropdown = document.getElementById('breedDropdown')
  breedInput.addEventListener('input', () => {
    form.breed = breedInput.value
    const q = breedInput.value.trim().toLowerCase()
    if (!q) { breedDropdown.style.display = 'none'; return }
    const results = breedCache.filter(b => b.canonical.toLowerCase().includes(q) || b.aliases.some(a => a.toLowerCase().includes(q))).slice(0, 10)
    if (!results.length) { breedDropdown.innerHTML = '<div class="breed-item" data-val="' + esc(breedInput.value) + '">使用「' + esc(breedInput.value) + '」</div>' }
    else { breedDropdown.innerHTML = results.map(b => '<div class="breed-item" data-val="' + esc(b.canonical) + '">' + esc(b.canonical) + (b.aliases.length ? '<span class="breed-aliases">' + esc(b.aliases.slice(0, 2).join('、')) + '</span>' : '') + '</div>').join('') }
    breedDropdown.style.display = 'block'
  })
  breedInput.addEventListener('focus', () => { if (breedDropdown.innerHTML) breedDropdown.style.display = 'block' })
  breedDropdown.addEventListener('click', e => { const it = e.target.closest('.breed-item'); if (!it) return; form.breed = it.dataset.val; breedInput.value = form.breed; breedDropdown.style.display = 'none' })
  document.addEventListener('click', e => { if (!e.target.closest('.breed-input-wrap')) breedDropdown.style.display = 'none' })

  // 生日算年龄
  document.getElementById('f_birth_date').addEventListener('change', e => {
    if (!e.target.value) return
    const birth = new Date(e.target.value); const now = new Date(); if (birth > now) return
    let years = now.getFullYear() - birth.getFullYear(); let months = now.getMonth() - birth.getMonth(); let days = now.getDate() - birth.getDate()
    if (days < 0) { months--; days += new Date(now.getFullYear(), now.getMonth(), 0).getDate() }
    if (months < 0) { years--; months += 12 }
    document.getElementById('f_age_years').value = years; document.getElementById('f_age_months').value = months; document.getElementById('f_age_days').value = days
    form.age_years = years; form.age_months = months; form.age_days = days
  })

  // 头像
  const avatarWrap = document.getElementById('avatarPreviewWrap')
  document.getElementById('avatarUpload').addEventListener('click', e => { if (e.target.id !== 'fileInput') document.getElementById('fileInput').click() })
  document.getElementById('fileInput').addEventListener('change', e => {
    const file = e.target.files?.[0]; if (!file) return
    if (file.size > 5 * 1024 * 1024) { toast('图片不能超过 5MB', 'error'); return }
    avatarFile = file
    avatarWrap.className = 'avatar-preview'
    avatarWrap.innerHTML = '<img src="' + URL.createObjectURL(file) + '" alt="宠物头像">'
  })

  document.getElementById('f_multi_pet').addEventListener('change', e => { env.multi_pet_household = e.target.checked; document.getElementById('petCountField').style.display = e.target.checked ? 'block' : 'none' })
  document.getElementById('f_has_children').addEventListener('change', e => { env.has_children = e.target.checked })

  document.getElementById('closeBtn').addEventListener('click', () => {
    if (form.name || form.breed || form.weight_kg) { if (!confirm('确定要放弃编辑吗？已填写的内容将不会保存。')) return }
    location.href = 'profile.html'
  })

  async function loadPetData (id) {
    const { data: p } = await sb.from('pets').select('*').eq('id', id).single()
    if (!p) return
    Object.assign(form, { name: p.name || '', species: p.species || 'cat', breed: p.breed || '', gender: p.gender || 'male', birth_date: p.birth_date || '', age_years: p.age_years ?? '', age_months: p.age_months ?? '', age_days: p.age_days ?? '', weight_kg: p.weight_kg != null ? Math.round(p.weight_kg * 100) / 100 : '', neutered: p.neutered || false, stomach_health: p.stomach_health || 'normal', pet_source: p.pet_source || 'other', home_date: p.home_date || '', photo_url: p.photo_url || '' })
    document.getElementById('f_name').value = form.name
    document.getElementById('f_breed').value = form.breed
    document.getElementById('f_birth_date').value = form.birth_date
    document.getElementById('f_age_years').value = form.age_years
    document.getElementById('f_age_months').value = form.age_months
    document.getElementById('f_age_days').value = form.age_days
    document.getElementById('f_weight_kg').value = form.weight_kg
    document.getElementById('f_home_date').value = form.home_date
    document.querySelector('input[name="gender"][value="' + form.gender + '"]').checked = true
    document.querySelector('input[name="neutered"][value="' + (form.neutered ? 'true' : 'false') + '"]').checked = true
    document.getElementById('greetingTitle').innerHTML = '编辑宠物档案<br><span class="highlight">修改毛孩子信息</span>'
    document.getElementById('saveBtn').textContent = '保存修改'
    refreshAllChips()
    if (form.photo_url) { avatarWrap.className = 'avatar-preview'; avatarWrap.innerHTML = '<img src="' + form.photo_url + '" alt="宠物头像">' }
    const { data: ev } = await sb.from('environment_profiles').select('*').eq('pet_id', id).single()
    if (ev) { Object.assign(env, { indoor_outdoor: ev.indoor_outdoor || 'indoor', activity_level: ev.activity_level || 'medium', multi_pet_household: ev.multi_pet_household || false, pet_count: ev.pet_count || 2, has_children: ev.has_children || false }); document.getElementById('f_multi_pet').checked = env.multi_pet_household; document.getElementById('f_pet_count').value = env.pet_count; document.getElementById('petCountField').style.display = env.multi_pet_household ? 'block' : 'none'; document.getElementById('f_has_children').checked = env.has_children; refreshAllChips() }
  }

  async function handleSave () {
    form.name = document.getElementById('f_name').value
    form.weight_kg = document.getElementById('f_weight_kg').value
    form.home_date = document.getElementById('f_home_date').value
    form.birth_date = document.getElementById('f_birth_date').value
    form.age_years = document.getElementById('f_age_years').value
    form.age_months = document.getElementById('f_age_months').value
    form.age_days = document.getElementById('f_age_days').value
    form.gender = document.querySelector('input[name="gender"]:checked').value
    form.neutered = document.querySelector('input[name="neutered"]:checked').value === 'true'
    env.pet_count = Number(document.getElementById('f_pet_count').value) || 2
    if (!form.name.trim()) { toast('请填写名字', 'error'); return }
    if (form.weight_kg !== '' && form.weight_kg != null && !(Number(form.weight_kg) > 0 && Number(form.weight_kg) < 200)) { toast('体重应在 0-200 kg 之间', 'error'); return }
    const btn = document.getElementById('saveBtn'); btn.disabled = true; btn.textContent = '保存中...'
    const uid = await D.getUid()
    const petPayload = { name: form.name.trim(), species: form.species, breed: form.breed.trim(), gender: form.gender || 'unknown', birth_date: form.birth_date || null, age_years: Number(form.age_years) || 0, age_months: Number(form.age_months) || 0, age_days: Number(form.age_days) || 0, weight_kg: form.weight_kg ? Math.round(Number(form.weight_kg) * 100) / 100 : null, neutered: form.neutered, stomach_health: form.stomach_health, pet_source: form.pet_source, home_date: form.home_date || null, photo_url: form.photo_url, is_active: true }
    let pet
    if (editMode) {
      const { data, error } = await sb.from('pets').update(petPayload).eq('id', editId).select().single()
      if (error) { btn.disabled = false; btn.textContent = '保存修改'; toast('保存失败', 'error'); return }
      pet = data
    } else {
      const { data, error } = await sb.from('pets').insert({ ...petPayload, profile_id: uid }).select().single()
      if (error) { btn.disabled = false; btn.textContent = '保存档案'; toast('创建失败', 'error'); return }
      pet = data
    }
    if (avatarFile) {
      const ext = avatarFile.name.split('.').pop() || 'jpg'
      const fn = uid + '/' + pet.id + '/' + Date.now() + '-' + Math.random().toString(36).slice(2, 8) + '.' + ext
      const { data: up, error: ue } = await sb.storage.from('pet-avatars').upload(fn, avatarFile, { cacheControl: '3600', upsert: false })
      if (!ue) { const { data: urlData } = sb.storage.from('pet-avatars').getPublicUrl(up.path); await sb.from('pets').update({ photo_url: urlData.publicUrl }).eq('id', pet.id) }
    }
    const envPayload = { pet_id: pet.id, profile_id: uid, indoor_outdoor: env.indoor_outdoor, activity_level: env.activity_level, multi_pet_household: env.multi_pet_household, pet_count: env.multi_pet_household ? env.pet_count : 1, has_children: env.has_children }
    await sb.from('environment_profiles').upsert(envPayload, { onConflict: 'pet_id' })
    btn.disabled = false; btn.textContent = editMode ? '保存修改' : '保存档案'
    toast(editMode ? '已保存' : '创建成功')
    setTimeout(() => { location.href = 'profile.html' }, 800)
  }
  document.getElementById('saveBtn').addEventListener('click', handleSave)

  function esc (s) { return String(s == null ? '' : s).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c])) }

  async function init () {
    await A.requireAuth()
    refreshAllChips()
    await loadBreeds(form.species)
    if (editMode) await loadPetData(editId)
  }
  init()
})()
</script>
</body>
</html>
