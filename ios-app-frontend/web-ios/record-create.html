<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1,user-scalable=no">
<title>添加记录 - Nuzzly 毛球镇</title>
<link rel="stylesheet" href="css/common.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
<style>
.edit-shell{width:100%;min-height:100vh;min-height:100dvh;background:var(--bg);padding-top:var(--safe-top)}
.page-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px}
.back-btn{width:40px;height:40px;border-radius:50%;background:var(--card);box-shadow:var(--shadow-card);display:flex;align-items:center;justify-content:center;border:1px solid var(--border);cursor:pointer}
.back-btn:active{transform:scale(.92)}
.back-btn svg{width:20px;height:20px;color:var(--fg)}
.page-title{font-family:var(--font-display);font-size:18px;font-weight:600;flex:1;text-align:center}
.header-action{font-size:15px;font-weight:600;color:var(--brown);background:none;border:none;cursor:pointer;padding:8px 12px}
.header-action:disabled{opacity:.4}
.tab-bar{display:flex;gap:12px;background:var(--card);border-radius:12px;padding:4px;box-shadow:var(--shadow-card);margin:0 16px}
.tab-item{flex:1;text-align:center;padding:10px 0;font-size:14px;font-weight:500;color:var(--muted);cursor:pointer;border-radius:8px;transition:all .2s}
.tab-item.active{background:var(--brown);color:#fff}
.edit-body{padding:16px 16px 40px}
.form-group{background:var(--card);border-radius:12px;padding:16px;margin-bottom:12px}
.form-label{font-size:13px;color:var(--muted);display:block;margin-bottom:8px}
.form-label .req{color:#FF3B30}
.form-input{width:100%;height:44px;border:1px solid var(--border);border-radius:10px;padding:0 14px;font-size:15px;font-family:var(--font-body);color:var(--fg);background:var(--bg);outline:none;transition:border-color .2s;box-sizing:border-box}
.form-input:focus{border-color:var(--brown)}
.form-textarea{width:100%;border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-size:15px;font-family:var(--font-body);color:var(--fg);background:var(--bg);outline:none;resize:none;transition:border-color .2s;box-sizing:border-box}
.form-textarea:focus{border-color:var(--brown)}
.chip-group{display:flex;flex-wrap:wrap;gap:8px}
.chip{display:flex;align-items:center;gap:4px;padding:8px 16px;border-radius:var(--radius-pill);background:var(--bg);border:1px solid var(--border);font-size:14px;color:var(--fg);cursor:pointer;transition:all .2s}
.chip.active{background:var(--brown);color:#fff;border-color:var(--brown)}
.empty-hint{font-size:13px;color:var(--muted);padding:8px 0}
.toast{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%) scale(.9);background:rgba(0,0,0,.78);color:#fff;padding:12px 20px;border-radius:12px;font-size:14px;z-index:9999;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;max-width:80%;text-align:center}
.toast.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
</style>
</head>
<body>
<div class="edit-shell">
  <header class="page-header">
    <button class="back-btn" onclick="history.back()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button>
    <h1 class="page-title">添加记录</h1>
    <button class="header-action" id="saveBtn">保存</button>
  </header>
  <div class="tab-bar" id="tabBar"></div>
  <div class="edit-body" id="body"></div>
</div>
<div id="toast" class="toast"></div>
<script>
(function () {
  const sb = window.sb, D = window.NuzzlyData, A = window.NuzzlyApp
  const SPECIES_EMOJI = { cat: '🐱', dog: '🐶' }
  const TABS = [{ value: 'diet', label: '饮食' }, { value: 'health', label: '健康' }, { value: 'weight', label: '体重' }]
  const FOOD_TYPES = [{ value: 'dry_food', label: '干粮', emoji: '🍖' }, { value: 'wet_food', label: '湿粮', emoji: '🐟' }, { value: 'water', label: '饮水', emoji: '💧' }, { value: 'treat', label: '零食', emoji: '🦴' }]
  const RECORD_TYPES = [{ value: 'vaccination', label: '疫苗', emoji: '💉' }, { value: 'symptom', label: '症状', emoji: '🩺' }, { value: 'medication', label: '用药', emoji: '💊' }, { value: 'diagnosis', label: '诊断', emoji: '📋' }, { value: 'checkup', label: '体检', emoji: '🩻' }]
  const SEVERITY = [{ value: 'mild', label: '轻度' }, { value: 'moderate', label: '中度' }, { value: 'severe', label: '重度' }]
  const params = new URLSearchParams(location.search)
  let pets = [], tab = params.get('type') === 'health' ? 'health' : params.get('type') === 'weight' ? 'weight' : 'diet'
  const form = { pet_id: params.get('petId') || '' }
  const dietForm = { food_name: '', food_type: 'dry_food', notes: '', logged_date: new Date().toISOString().slice(0, 10) }
  const healthForm = { record_type: 'vaccination', severity: 'mild', record_time: nowStr(), notes: '' }
  const weightForm = { weight_kg: null, record_time: nowStr(), notes: '' }
  let saving = false
  function nowStr () { const d = new Date(); const off = d.getTimezoneOffset(); d.setMinutes(d.getMinutes() - off); return d.toISOString().slice(0, 16) }
  function toast (msg, theme) { const el = document.getElementById('toast'); el.textContent = msg; el.className = 'toast show ' + (theme || 'success'); clearTimeout(window.__t); window.__t = setTimeout(() => { el.className = 'toast' }, 2000) }
  function esc (s) { return String(s == null ? '' : s).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c])) }
  function chips (opts, val) { return opts.map(o => '<div class="chip' + (val === o.value ? ' active' : '') + '" data-v="' + o.value + '">' + (o.emoji ? o.emoji + ' ' : '') + o.label + '</div>').join('') }
  function bindChips (containerId, obj, field, after) { const c = document.getElementById(containerId); if (!c) return; c.querySelectorAll('.chip').forEach(el => el.onclick = () => { obj[field] = el.dataset.v; if (after) after(); render() }) }

  function render () {
    document.getElementById('tabBar').innerHTML = TABS.map(t => '<div class="tab-item' + (tab === t.value ? ' active' : '') + '" data-t="' + t.value + '">' + t.label + '</div>').join('')
    document.querySelectorAll('.tab-item').forEach(el => el.onclick = () => { tab = el.dataset.t; render() })
    let html = '<div class="form-group"><label class="form-label">选择宠物 <span class="req">*</span></label>' + (pets.length ? '<div class="chip-group" id="petChips">' + chips(pets.map(p => ({ value: p.id, label: p.name, emoji: SPECIES_EMOJI[p.species] || '🐾' })), form.pet_id) + '</div>' : '<div class="empty-hint">暂无宠物，请先创建档案</div>') + '</div>'
    if (tab === 'diet') {
      html += '<div class="form-group"><label class="form-label">食物名称 <span class="req">*</span></label><input id="f_food_name" class="form-input" value="' + esc(dietForm.food_name) + '" placeholder="如：渴望鸡肉猫粮"></div>'
      html += '<div class="form-group"><label class="form-label">食物类型 <span class="req">*</span></label><div class="chip-group" id="ftChips">' + chips(FOOD_TYPES, dietForm.food_type) + '</div></div>'
      html += '<div class="form-group"><label class="form-label">备注（份量/时间等）</label><textarea id="f_notes" class="form-textarea" rows="2" placeholder="如：早餐 · 25g">' + esc(dietForm.notes) + '</textarea></div>'
      html += '<div class="form-group"><label class="form-label">日期 <span class="req">*</span></label><input id="f_logged_date" type="date" class="form-input" value="' + esc(dietForm.logged_date) + '"></div>'
    } else if (tab === 'health') {
      html += '<div class="form-group"><label class="form-label">记录类型 <span class="req">*</span></label><div class="chip-group" id="rtChips">' + chips(RECORD_TYPES, healthForm.record_type) + '</div></div>'
      html += '<div class="form-group"><label class="form-label">严重程度 <span class="req">*</span></label><div class="chip-group" id="sevChips">' + chips(SEVERITY, healthForm.severity) + '</div></div>'
      html += '<div class="form-group"><label class="form-label">时间 <span class="req">*</span></label><input id="f_record_time" type="datetime-local" class="form-input" value="' + esc(healthForm.record_time) + '"></div>'
      html += '<div class="form-group"><label class="form-label">详情说明</label><textarea id="f_hnotes" class="form-textarea" rows="3" placeholder="如：猫三联疫苗 · 已完成 · 下次 2026-09">' + esc(healthForm.notes) + '</textarea></div>'
    } else {
      html += '<div class="form-group"><label class="form-label">体重（kg） <span class="req">*</span></label><input id="f_weight" type="number" step="0.01" min="0" class="form-input" value="' + (weightForm.weight_kg != null ? esc(weightForm.weight_kg) : '') + '" placeholder="如：4.8"></div>'
      html += '<div class="form-group"><label class="form-label">测量时间 <span class="req">*</span></label><input id="f_wtime" type="datetime-local" class="form-input" value="' + esc(weightForm.record_time) + '"></div>'
      html += '<div class="form-group"><label class="form-label">备注</label><textarea id="f_wnotes" class="form-textarea" rows="2" placeholder="可选">' + esc(weightForm.notes) + '</textarea></div>'
    }
    document.getElementById('body').innerHTML = html
    bindChips('petChips', form, 'pet_id')
    if (tab === 'diet') { document.getElementById('f_food_name').oninput = e => dietForm.food_name = e.target.value; document.getElementById('f_notes').oninput = e => dietForm.notes = e.target.value; document.getElementById('f_logged_date').oninput = e => dietForm.logged_date = e.target.value; bindChips('ftChips', dietForm, 'food_type') }
    else if (tab === 'health') { document.getElementById('f_record_time').oninput = e => healthForm.record_time = e.target.value; document.getElementById('f_hnotes').oninput = e => healthForm.notes = e.target.value; bindChips('rtChips', healthForm, 'record_type'); bindChips('sevChips', healthForm, 'severity') }
    else { document.getElementById('f_weight').oninput = e => weightForm.weight_kg = e.target.value; document.getElementById('f_wtime').oninput = e => weightForm.record_time = e.target.value; document.getElementById('f_wnotes').oninput = e => weightForm.notes = e.target.value }
  }

  async function handleSave () {
    if (saving) return
    if (!form.pet_id) { toast('请选择宠物', 'error'); return }
    saving = true; const btn = document.getElementById('saveBtn'); btn.disabled = true; btn.textContent = '保存中…'
    const uid = await D.getUid()
    try {
      if (tab === 'diet') {
        if (!dietForm.food_name.trim()) { toast('请填写食物名称', 'error'); saving = false; btn.disabled = false; btn.textContent = '保存'; return }
        const { error } = await sb.from('diet_logs').insert({ pet_id: form.pet_id, profile_id: uid, food_name: dietForm.food_name.trim(), food_type: dietForm.food_type, notes: dietForm.notes, logged_date: dietForm.logged_date }).select().single()
        if (error) throw new Error(error.message)
      } else if (tab === 'health') {
        if (!healthForm.notes.trim()) { toast('请填写详情', 'error'); saving = false; btn.disabled = false; btn.textContent = '保存'; return }
        const { error } = await sb.from('health_records').insert({ pet_id: form.pet_id, profile_id: uid, record_type: healthForm.record_type, severity: healthForm.severity, record_time: healthForm.record_time, notes: healthForm.notes }).select().single()
        if (error) throw new Error(error.message)
      } else {
        if (!weightForm.weight_kg) { toast('请填写体重', 'error'); saving = false; btn.disabled = false; btn.textContent = '保存'; return }
        const kg = Math.round(Number(weightForm.weight_kg) * 100) / 100
        const { error } = await sb.from('health_records').insert({ pet_id: form.pet_id, profile_id: uid, record_type: 'weight', weight_kg: kg, record_time: weightForm.record_time, notes: weightForm.notes }).select().single()
        if (error) throw new Error(error.message)
        await sb.from('pets').update({ weight_kg: kg }).eq('id', form.pet_id)
      }
      toast('记录已添加')
      setTimeout(() => history.back(), 800)
    } catch (e) { toast(e.message || '添加失败', 'error') }
    finally { saving = false; btn.disabled = false; btn.textContent = '保存' }
  }
  document.getElementById('saveBtn').onclick = handleSave

  async function init () {
    await A.requireAuth()
    const uid = await D.getUid(); pets = await D.getPets(uid) || []
    if (!form.pet_id && pets.length) form.pet_id = pets[0].id
    render()
  }
  init()
})()
</script>
</body>
</html>
