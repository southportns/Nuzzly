<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1,user-scalable=no">
<title>任务管理 - Nuzzly 毛球镇</title>
<link rel="stylesheet" href="css/common.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
<style>
.app-shell{width:100%;min-height:100vh;min-height:100dvh;padding-top:var(--safe-top);padding-bottom:calc(80px + var(--safe-bottom));overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.page-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px}
.back-btn{width:40px;height:40px;border-radius:50%;background:var(--card);box-shadow:var(--shadow-card);display:flex;align-items:center;justify-content:center;border:1px solid var(--border);cursor:pointer}
.back-btn:active{transform:scale(.92)}
.back-btn svg{width:20px;height:20px;color:var(--fg)}
.page-title{font-family:var(--font-display);font-size:18px;font-weight:600;flex:1;text-align:center}
.header-action{font-size:15px;font-weight:600;color:var(--brown);background:none;border:none;cursor:pointer;padding:8px 12px}
.pet-tabs{display:flex;gap:8px;padding:12px 16px;overflow-x:auto;scrollbar-width:none}
.pet-tabs::-webkit-scrollbar{display:none}
.pet-tab{flex-shrink:0;display:flex;align-items:center;gap:4px;padding:6px 14px;border-radius:var(--radius-pill);background:rgba(0,0,0,.04);font-size:14px;color:var(--muted);cursor:pointer;transition:all .2s}
.pet-tab.active{background:var(--brown);color:#fff}
.score-overview{display:flex;align-items:center;gap:20px;margin:8px 20px 20px;padding:20px;background:var(--card);border-radius:var(--radius-card);box-shadow:var(--shadow-card);border:1px solid var(--border)}
.score-circle{width:72px;height:72px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;background:rgba(108,138,105,.08);color:var(--green)}
.score-circle.warn{background:rgba(255,149,0,.08);color:#FF9500}
.score-circle.bad{background:rgba(255,59,48,.08);color:#FF3B30}
.score-num{font-family:var(--font-num);font-size:28px;font-weight:700;line-height:1}
.score-unit{font-size:11px;opacity:.7}
.score-detail{flex:1;min-width:0}
.score-title{font-size:15px;font-weight:600;color:var(--fg);margin-bottom:8px}
.score-bar-wrap{display:flex;align-items:center;gap:8px}
.score-bar{flex:1;height:6px;border-radius:3px;background:rgba(0,0,0,.06);overflow:hidden}
.score-bar-fill{height:100%;border-radius:3px;transition:width .4s ease}
.score-bar-fill.good{background:linear-gradient(90deg,var(--green),#34C759)}
.score-bar-fill.warn{background:linear-gradient(90deg,#FF9500,#FFCC02)}
.score-bar-fill.bad{background:linear-gradient(90deg,#FF3B30,#FF9500)}
.score-bar-text{font-size:12px;color:var(--muted);white-space:nowrap}
.section{padding:0 20px;margin-bottom:16px}
.section-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.section-header.collapsible{cursor:pointer}
.section-header.collapsible svg{width:16px;height:16px;color:var(--muted);transition:transform .25s}
.section-header.collapsible svg.rotated{transform:rotate(180deg)}
.section-title{font-size:16px;font-weight:600;color:var(--fg)}
.section-title.done{color:var(--muted)}
.section-badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:var(--radius-pill);background:rgba(255,149,0,.1);color:#FF9500}
.section-badge.done-count{background:rgba(108,138,105,.1);color:var(--green)}
.empty-hint{text-align:center;font-size:14px;color:var(--muted);padding:20px 0}
.task-row{display:flex;align-items:center;gap:12px;padding:14px 16px;margin-bottom:6px;border-radius:16px;background:var(--card);box-shadow:0 1px 4px rgba(0,0,0,.03);border:1px solid var(--border);cursor:pointer;transition:transform .15s;user-select:none}
.task-row:active{transform:scale(.98)}
.task-row.completed{opacity:.55}
.task-check{width:24px;height:24px;flex-shrink:0}
.task-check svg{width:24px;height:24px;color:var(--muted)}
.task-check.checked svg{color:var(--green)}
.task-info{flex:1;min-width:0;display:flex;align-items:center;gap:8px}
.task-icon{font-size:20px;flex-shrink:0}
.task-text{flex:1;min-width:0}
.task-title{font-size:15px;color:var(--fg);font-weight:500}
.task-title.done{color:var(--muted);text-decoration:line-through}
.task-meta{font-size:11px;color:var(--muted);margin-top:2px}
.task-weight{font-size:14px;font-weight:600;color:var(--brown);white-space:nowrap}
.task-weight.done{color:var(--green)}
.template-grid{display:flex;flex-wrap:wrap;gap:8px}
.template-chip{display:flex;align-items:center;gap:4px;padding:8px 14px;border-radius:var(--radius-pill);background:rgba(0,0,0,.04);font-size:13px;color:var(--fg);cursor:pointer}
.template-chip:active{background:rgba(0,0,0,.1)}
.template-freq{font-size:11px;color:var(--muted);margin-left:2px}
.skeleton-list{padding:0 20px}
.task-row.skeleton{gap:16px}
.shimmer-circle{width:36px;height:36px;border-radius:50%;background:linear-gradient(90deg,rgba(0,0,0,.04) 25%,rgba(0,0,0,.08) 37%,rgba(0,0,0,.04) 63%);background-size:400% 100%;animation:shimmer 1.4s ease infinite}
.shimmer-line{height:14px;border-radius:7px;background:linear-gradient(90deg,rgba(0,0,0,.04) 25%,rgba(0,0,0,.08) 37%,rgba(0,0,0,.04) 63%);background-size:400% 100%;animation:shimmer 1.4s ease infinite}
.shimmer-line.w60{width:60%}
@keyframes shimmer{0%{background-position:100% 0}100%{background-position:0 0}}
.sheet-overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.35);display:flex;align-items:flex-end;justify-content:center}
.sheet-panel{width:100%;max-width:480px;max-height:80vh;background:var(--card);border-radius:24px 24px 0 0;padding:12px 20px 32px;overflow-y:auto}
.sheet-handle{width:36px;height:4px;border-radius:2px;background:rgba(0,0,0,.12);margin:0 auto 16px}
.sheet-title{font-size:18px;font-weight:700;color:var(--fg);margin-bottom:16px}
.quick-templates{display:flex;flex-direction:column;gap:4px}
.quick-tpl-row{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:12px;cursor:pointer;font-size:15px;color:var(--fg);transition:background .15s}
.quick-tpl-row:active{background:rgba(0,0,0,.04)}
.quick-tpl-row.custom{color:var(--brown);font-weight:500}
.q-freq{font-size:12px;color:var(--muted);margin-left:auto}
.form-group{margin-bottom:14px}
.form-group.half{margin-bottom:0;flex:1}
.form-label{font-size:13px;color:var(--muted);display:block;margin-bottom:6px}
.form-input{width:100%;height:42px;border:1px solid var(--border);border-radius:10px;padding:0 12px;font-size:15px;font-family:var(--font-body);color:var(--fg);background:var(--bg);outline:none;box-sizing:border-box}
.form-input:focus{border-color:var(--brown)}
.form-row{display:flex;gap:12px}
.icon-picker{display:flex;flex-wrap:wrap;gap:6px}
.icon-option{width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:10px;font-size:20px;cursor:pointer;background:var(--bg);border:1.5px solid transparent;transition:all .15s}
.icon-option.active{border-color:var(--brown);background:rgba(139,94,70,.08)}
.weight-picker{display:flex;align-items:center;gap:12px;height:42px;padding:0 14px;border-radius:10px;background:var(--bg);border:1px solid var(--border)}
.weight-picker button{width:28px;height:28px;border-radius:50%;border:none;background:var(--brown);color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.weight-picker button:active{opacity:.7}
.weight-picker span{font-family:var(--font-num);font-size:17px;font-weight:600;color:var(--fg)}
.sheet-actions{display:flex;gap:12px;margin-top:16px}
.sheet-btn{flex:1;height:46px;border-radius:var(--radius-btn);font-size:15px;font-weight:500;cursor:pointer;transition:transform .15s;border:none}
.sheet-btn:active{transform:scale(.97)}
.sheet-btn.primary{background:var(--brown);color:#fff}
.sheet-btn.secondary{background:rgba(0,0,0,.06);color:var(--fg)}
.sheet-btn.danger{background:#FF3B30;color:#fff}
.sheet-btn:disabled{opacity:.4}
.delete-desc{font-size:14px;color:var(--muted);text-align:center;padding:12px 0}
.toast{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%) scale(.9);background:rgba(0,0,0,.78);color:#fff;padding:12px 20px;border-radius:12px;font-size:14px;z-index:9999;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;max-width:80%;text-align:center}
.toast.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
</style>
</head>
<body>
<div class="app-shell">
  <header class="page-header">
    <button class="back-btn" onclick="history.back()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button>
    <h1 class="page-title">任务管理</h1>
    <button class="header-action" id="addAction">添加</button>
  </header>
  <div class="pet-tabs" id="petTabs" style="display:none"></div>
  <div id="scoreBox"></div>
  <div id="body"></div>
</div>
<div id="toast" class="toast"></div>
<div id="sheetRoot"></div>
<script>
(function () {
  const sb = window.sb, D = window.NuzzlyData, A = window.NuzzlyApp
  const SPECIES_EMOJI = { cat: '🐱', dog: '🐶' }
  const FREQUENCY_LABELS = { daily: '每天', weekly: '每周', monthly: '每月', custom_days: '每N天' }
  const FREQUENCY_OPTIONS = [{ value: 'daily', label: '每天' }, { value: 'weekly', label: '每周' }, { value: 'monthly', label: '每月' }, { value: 'custom_days', label: '自定义天数' }]
  const commonIcons = ['🍽', '💧', '🧹', '🦮', '🧼', '💊', '✂', '🏥', '🪥', '🧸', '🌿', '📋']
  const BUILTIN_TEMPLATES = {
    cat: [{ title: '早晨喂食', icon: '🍽', category: 'feeding', frequency: 'daily', weight: 20, reminder_time: '08:00' }, { title: '晚上喂食', icon: '🍽', category: 'feeding', frequency: 'daily', weight: 20, reminder_time: '19:00' }, { title: '换水', icon: '💧', category: 'water', frequency: 'daily', weight: 15, reminder_time: '09:00' }, { title: '铲屎', icon: '🧹', category: 'litter', frequency: 'daily', weight: 15, reminder_time: '20:00' }, { title: '食盆清洁', icon: '🧼', category: 'bowl_clean', frequency: 'weekly', weight: 10, reminder_time: '10:00' }, { title: '驱虫', icon: '💊', category: 'deworm', frequency: 'monthly', weight: 10 }, { title: '梳毛', icon: '✂', category: 'grooming', frequency: 'weekly', weight: 10 }],
    dog: [{ title: '早晨喂食', icon: '🍽', category: 'feeding', frequency: 'daily', weight: 20, reminder_time: '08:00' }, { title: '晚上喂食', icon: '🍽', category: 'feeding', frequency: 'daily', weight: 20, reminder_time: '19:00' }, { title: '换水', icon: '💧', category: 'water', frequency: 'daily', weight: 10, reminder_time: '09:00' }, { title: '早晨遛狗', icon: '🦮', category: 'walk', frequency: 'daily', weight: 15, reminder_time: '07:30' }, { title: '晚上遛狗', icon: '🦮', category: 'walk', frequency: 'daily', weight: 15, reminder_time: '19:00' }, { title: '食盆清洁', icon: '🧼', category: 'bowl_clean', frequency: 'weekly', weight: 10, reminder_time: '10:00' }, { title: '驱虫', icon: '💊', category: 'deworm', frequency: 'monthly', weight: 10 }],
    other: [{ title: '早晨喂食', icon: '🍽', category: 'feeding', frequency: 'daily', weight: 20, reminder_time: '08:00' }, { title: '晚上喂食', icon: '🍽', category: 'feeding', frequency: 'daily', weight: 20, reminder_time: '19:00' }, { title: '换水', icon: '💧', category: 'water', frequency: 'daily', weight: 15, reminder_time: '09:00' }, { title: '食盆清洁', icon: '🧼', category: 'bowl_clean', frequency: 'weekly', weight: 10, reminder_time: '10:00' }, { title: '驱虫', icon: '💊', category: 'deworm', frequency: 'monthly', weight: 10 }]
  }
  function getBuiltInTemplates (species) { return BUILTIN_TEMPLATES[species] || BUILTIN_TEMPLATES.other }
  function toast (msg, theme) { const el = document.getElementById('toast'); el.textContent = msg; el.className = 'toast show ' + (theme || 'success'); clearTimeout(window.__t); window.__t = setTimeout(() => { el.className = 'toast' }, 2000) }
  function esc (s) { return String(s == null ? '' : s).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c])) }
  function freqLabel (task) { if (task.frequency === 'custom_days') return '每' + (task.custom_days || 1) + '天'; return FREQUENCY_LABELS[task.frequency] || task.frequency }

  function isSameWeek (d1, d2) { const wy = d => { const s = new Date(d.getFullYear(), 0, 1); return Math.floor(((d - s) / 86400000 + s.getDay() + 1) / 7) }; return d1.getFullYear() === d2.getFullYear() && wy(d1) === wy(d2) }
  function isSameMonth (d1, d2) { return d1.getFullYear() === d2.getFullYear() && d1.getMonth() === d2.getMonth() }
  function isTaskDueToday (task, todayDate) {
    switch (task.frequency) {
      case 'daily': return true
      case 'weekly': if (!task.last_completed_date) return true; const lc = new Date(task.last_completed_date); const td = new Date(todayDate); const dd = Math.floor((td - lc) / 86400000); return dd >= 7 || !isSameWeek(lc, td)
      case 'monthly': if (!task.last_completed_date) return true; return !isSameMonth(new Date(task.last_completed_date), new Date(todayDate))
      case 'custom_days': if (!task.last_completed_date) return true; const cd = Math.floor((new Date(todayDate) - new Date(task.last_completed_date)) / 86400000); return cd >= (task.custom_days || 1)
      default: return true
    }
  }
  function computeTodayScore (tasks, logs) {
    const today = new Date().toISOString().slice(0, 10)
    const dueTasks = tasks.filter(t => isTaskDueToday(t, today))
    if (dueTasks.length === 0) return { score: 100, completedCount: 0, totalCount: 0 }
    const logMap = {}; logs.forEach(l => { logMap[l.task_id] = l })
    let cw = 0, tw = 0
    dueTasks.forEach(t => { const log = logMap[t.id]; if (log) t.last_completed_date = log.task_date; tw += t.weight || 10; if (log && log.completed) cw += t.weight || 10 })
    return { score: tw > 0 ? Math.round((cw / tw) * 100) : 100, completedCount: dueTasks.filter(t => logMap[t.id]?.completed).length, totalCount: dueTasks.length }
  }

  let pets = [], petId = null, tasks = [], logs = [], loading = true, showTemplates = false
  let showAddSheet = false, customForm = { title: undefined, icon: '📋', frequency: 'daily', custom_days: null, reminder_time: null, weight: 10, reminder_enabled: true }
  let deletingTask = null, touchTimer = null

  async function fetchTasks (pid) { const { data } = await sb.from('daily_tasks').select('*').eq('pet_id', pid).eq('is_active', true).order('sort_order'); return data || [] }
  async function fetchTodayLogs (pid) { const today = new Date().toISOString().slice(0, 10); const { data } = await sb.from('daily_task_logs').select('*').eq('pet_id', pid).eq('task_date', today); return data || [] }

  async function refresh () {
    if (!petId) return
    loading = true; render()
    const [t, l] = await Promise.all([fetchTasks(petId), fetchTodayLogs(petId)])
    tasks = t; logs = l; loading = false; render()
  }
  async function toggleTask (task) {
    try {
      const today = new Date().toISOString().slice(0, 10)
      if (task.completed) { await sb.from('daily_task_logs').update({ completed: false, completed_at: null }).eq('task_id', task.id).eq('task_date', today) }
      else { const uid = await D.getUid(); await sb.from('daily_task_logs').upsert({ task_id: task.id, pet_id: petId, profile_id: uid, task_date: today, completed: true, completed_at: new Date().toISOString(), skipped: false }, { onConflict: 'task_id,pet_id,task_date' }) }
      logs = await fetchTodayLogs(petId); render()
    } catch (e) { toast(e.message || '操作失败', 'error') }
  }
  async function addTask (td) {
    const uid = await D.getUid()
    const { data, error } = await sb.from('daily_tasks').insert({ pet_id: petId, profile_id: uid, category: td.category || 'other', title: td.title, icon: td.icon || '📋', frequency: td.frequency || 'daily', custom_days: td.custom_days || null, reminder_time: td.reminder_time || null, reminder_enabled: td.reminder_enabled || false, weight: td.weight || 10, sort_order: 99, is_builtin: false, is_active: true }).select().single()
    if (error) throw new Error(error.message)
    tasks = [...tasks, data]; return data
  }
  async function removeTask (id) { const { error } = await sb.from('daily_tasks').update({ is_active: false, updated_at: new Date().toISOString() }).eq('id', id); if (error) throw new Error(error.message); tasks = tasks.filter(t => t.id !== id) }

  function renderPetTabs () {
    const box = document.getElementById('petTabs')
    if (pets.length > 1) { box.style.display = 'flex'; box.innerHTML = pets.map(p => '<div class="pet-tab' + (p.id === petId ? ' active' : '') + '" data-pid="' + p.id + '"><span>' + (SPECIES_EMOJI[p.species] || '🐾') + '</span><span>' + esc(p.name) + '</span></div>').join(''); box.querySelectorAll('.pet-tab').forEach(el => el.onclick = () => switchPet(el.dataset.pid)) }
    else box.style.display = 'none'
  }
  function renderScore () {
    const prog = computeTodayScore(tasks, logs)
    const cls = prog.score >= 80 ? 'good' : prog.score >= 50 ? 'warn' : 'bad'
    document.getElementById('scoreBox').innerHTML = '<div class="score-overview"><div class="score-circle ' + cls + '"><span class="score-num">' + prog.score + '</span><span class="score-unit">分</span></div><div class="score-detail"><div class="score-title">今日完成度</div><div class="score-bar-wrap"><div class="score-bar"><div class="score-bar-fill ' + cls + '" style="width:' + prog.score + '%"></div></div><span class="score-bar-text">' + prog.completedCount + '/' + prog.totalCount + ' 项</span></div></div></div>'
  }
  function render () {
    renderPetTabs()
    if (loading) { document.getElementById('scoreBox').innerHTML = ''; document.getElementById('body').innerHTML = '<div class="skeleton-list">' + Array.from({ length: 5 }, () => '<div class="task-row skeleton"><div class="shimmer-circle"></div><div class="shimmer-line w60"></div></div>').join('') + '</div>'; return }
    renderScore()
    const today = new Date().toISOString().slice(0, 10)
    const logMap = {}; logs.forEach(l => { logMap[l.task_id] = l })
    const todayTasks = tasks.filter(t => isTaskDueToday(t, today)).map(t => ({ ...t, completed: logMap[t.id]?.completed || false }))
    const pending = todayTasks.filter(t => !t.completed)
    const completed = todayTasks.filter(t => t.completed)
    const pet = pets.find(p => p.id === petId)
    const builtin = getBuiltInTemplates(pet?.species || 'other')
    const existing = new Set(tasks.map(t => t.title))
    const available = builtin.filter(t => !existing.has(t.title))
    let html = '<div class="section"><div class="section-header"><span class="section-title">待完成</span><span class="section-badge">' + pending.length + '</span></div>'
    if (!pending.length) html += '<div class="empty-hint">🎉 全部完成，太棒了！</div>'
    html += pending.map(t => '<div class="task-row pending" data-tid="' + t.id + '"><div class="task-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/></svg></div><div class="task-info"><span class="task-icon">' + esc(t.icon || '📋') + '</span><div class="task-text"><div class="task-title">' + esc(t.title) + '</div><div class="task-meta">' + (t.weight || 10) + '分 · ' + esc(freqLabel(t)) + (t.reminder_time ? ' · ' + t.reminder_time.slice(0, 5) : '') + '</div></div></div><div class="task-weight">+' + (t.weight || 10) + '</div></div>').join('') + '</div>'
    if (completed.length) {
      html += '<div class="section"><div class="section-header"><span class="section-title done">已完成</span><span class="section-badge done-count">' + completed.length + '</span></div>'
      html += completed.map(t => '<div class="task-row completed" data-tid="' + t.id + '"><div class="task-check checked"><svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg></div><div class="task-info"><span class="task-icon">' + esc(t.icon || '📋') + '</span><div class="task-text"><div class="task-title done">' + esc(t.title) + '</div><div class="task-meta">' + (t.weight || 10) + '分 · ' + esc(freqLabel(t)) + '</div></div></div><div class="task-weight done">✓</div></div>').join('') + '</div>'
    }
    html += '<div class="section"><div class="section-header collapsible" id="tplToggle"><span class="section-title">📦 任务模板库</span><svg class="' + (showTemplates ? 'rotated' : '') + '" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 9l6 6 6-6"/></svg></div>'
    if (showTemplates) html += '<div class="template-grid">' + available.map(t => '<div class="template-chip" data-tpl="' + esc(t.title) + '"><span>' + esc(t.icon) + '</span><span>' + esc(t.title) + '</span><span class="template-freq">' + esc(freqLabel(t)) + '</span></div>').join('') + '</div>'
    html += '</div>'
    document.getElementById('body').innerHTML = html
    document.querySelectorAll('.task-row[data-tid]').forEach(row => {
      const tid = row.dataset.tid; const task = todayTasks.find(t => String(t.id) === tid)
      row.onclick = () => toggleTask(task)
      row.ontouchstart = (e) => { if (task.is_builtin) return; touchTimer = setTimeout(() => { deletingTask = task; showDeleteConfirm() }, 600) }
      row.ontouchend = () => { if (touchTimer) { clearTimeout(touchTimer); touchTimer = null } }
      row.ontouchmove = () => { if (touchTimer) { clearTimeout(touchTimer); touchTimer = null } }
    })
    const tplToggle = document.getElementById('tplToggle'); if (tplToggle) tplToggle.onclick = () => { showTemplates = !showTemplates; render() }
    document.querySelectorAll('.template-chip[data-tpl]').forEach(el => el.onclick = () => { const tpl = builtin.find(t => t.title === el.dataset.tpl); if (tpl) openAddSheet(tpl) })
  }

  function openAddSheet (presetTpl) {
    if (presetTpl) customForm = { title: presetTpl.title, icon: presetTpl.icon, frequency: presetTpl.frequency, custom_days: presetTpl.custom_days || null, reminder_time: presetTpl.reminder_time || null, weight: presetTpl.weight || 10, reminder_enabled: !!presetTpl.reminder_time }
    else customForm = { title: undefined, icon: '📋', frequency: 'daily', custom_days: null, reminder_time: null, weight: 10, reminder_enabled: true }
    showAddSheet = true; renderSheet()
  }
  function closeSheet () { showAddSheet = false; document.getElementById('sheetRoot').innerHTML = '' }
  function renderSheet () {
    if (!showAddSheet) return
    const pet = pets.find(p => p.id === petId)
    const builtin = getBuiltInTemplates(pet?.species || 'other')
    let html = '<div class="sheet-overlay" id="sheetOverlay"><div class="sheet-panel"><div class="sheet-handle"></div><h3 class="sheet-title">添加任务</h3>'
    if (customForm.title === undefined) {
      html += '<div class="quick-templates">' + builtin.map(t => '<div class="quick-tpl-row" data-qt="' + esc(t.title) + '"><span>' + esc(t.icon) + '</span><span>' + esc(t.title) + '</span><span class="q-freq">' + esc(freqLabel(t)) + '</span></div>').join('') + '<div class="quick-tpl-row custom" id="customTask"><span>✏</span><span>自定义任务</span></div></div>'
    } else {
      html += '<div class="form-group"><label class="form-label">任务名称</label><input id="f_title" class="form-input" value="' + esc(customForm.title || '') + '" placeholder="例如：清理猫砂盆"></div>'
      html += '<div class="form-group"><label class="form-label">图标</label><div class="icon-picker" id="iconPicker">' + commonIcons.map(ic => '<span class="icon-option' + (customForm.icon === ic ? ' active' : '') + '" data-ic="' + ic + '">' + ic + '</span>').join('') + '</div></div>'
      html += '<div class="form-row"><div class="form-group half"><label class="form-label">频率</label><select id="f_freq" class="form-input">' + FREQUENCY_OPTIONS.map(o => '<option value="' + o.value + '"' + (customForm.frequency === o.value ? ' selected' : '') + '>' + o.label + '</option>').join('') + '</select></div>' + (customForm.frequency === 'custom_days' ? '<div class="form-group half"><label class="form-label">间隔天数</label><input id="f_cdays" type="number" min="1" class="form-input" value="' + (customForm.custom_days || '') + '" placeholder="3"></div>' : '') + '</div>'
      html += '<div class="form-row"><div class="form-group half"><label class="form-label">权重分</label><div class="weight-picker"><button id="w_minus">−</button><span id="w_val">' + customForm.weight + '</span><button id="w_plus">+</button></div></div><div class="form-group half"><label class="form-label">提醒时间</label><input id="f_time" type="time" class="form-input" value="' + (customForm.reminder_time || '') + '"></div></div>'
      html += '<div class="sheet-actions"><button class="sheet-btn secondary" id="backBtn">返回选择</button><button class="sheet-btn primary" id="addBtn">添加任务</button></div>'
    }
    html += '</div></div>'
    document.getElementById('sheetRoot').innerHTML = html
    document.getElementById('sheetOverlay').onclick = (e) => { if (e.target.id === 'sheetOverlay') closeSheet() }
    if (customForm.title === undefined) {
      document.querySelectorAll('.quick-tpl-row[data-qt]').forEach(el => el.onclick = () => { const t = builtin.find(x => x.title === el.dataset.qt); if (t) openAddSheet(t) })
      document.getElementById('customTask').onclick = () => { customForm.title = ''; renderSheet() }
    } else {
      document.getElementById('f_title').oninput = (e) => customForm.title = e.target.value
      document.getElementById('iconPicker').querySelectorAll('.icon-option').forEach(el => el.onclick = () => { customForm.icon = el.dataset.ic; renderSheet() })
      document.getElementById('f_freq').onchange = (e) => { customForm.frequency = e.target.value; renderSheet() }
      const cd = document.getElementById('f_cdays'); if (cd) cd.oninput = (e) => customForm.custom_days = Number(e.target.value)
      document.getElementById('w_minus').onclick = () => { customForm.weight = Math.max(1, customForm.weight - 5); document.getElementById('w_val').textContent = customForm.weight }
      document.getElementById('w_plus').onclick = () => { customForm.weight = Math.min(100, customForm.weight + 5); document.getElementById('w_val').textContent = customForm.weight }
      const ft = document.getElementById('f_time'); ft.oninput = (e) => { customForm.reminder_time = e.target.value || null; customForm.reminder_enabled = !!e.target.value }
      document.getElementById('backBtn').onclick = () => { customForm.title = undefined; renderSheet() }
      document.getElementById('addBtn').onclick = async () => {
        if (!customForm.title || !customForm.title.trim()) { toast('请填写任务名称', 'error'); return }
        try { await addTask({ title: customForm.title.trim(), icon: customForm.icon, frequency: customForm.frequency, custom_days: customForm.custom_days, reminder_time: customForm.reminder_time || null, reminder_enabled: customForm.reminder_enabled, weight: customForm.weight }); toast('任务已添加'); closeSheet(); render() }
        catch (e) { toast(e.message || '添加失败', 'error') }
      }
    }
  }
  function showDeleteConfirm () {
    document.getElementById('sheetRoot').innerHTML = '<div class="sheet-overlay" id="delOverlay"><div class="sheet-panel"><div class="sheet-handle"></div><h3 class="sheet-title">确认删除</h3><p class="delete-desc">确定要删除任务"' + esc(deletingTask.title) + '"吗？</p><div class="sheet-actions"><button class="sheet-btn secondary" id="delCancel">取消</button><button class="sheet-btn danger" id="delOk">删除</button></div></div></div>'
    document.getElementById('delOverlay').onclick = (e) => { if (e.target.id === 'delOverlay') { deletingTask = null; document.getElementById('sheetRoot').innerHTML = '' } }
    document.getElementById('delCancel').onclick = () => { deletingTask = null; document.getElementById('sheetRoot').innerHTML = '' }
    document.getElementById('delOk').onclick = async () => { try { await removeTask(deletingTask.id); toast('已删除'); deletingTask = null; document.getElementById('sheetRoot').innerHTML = ''; render() } catch (e) { toast(e.message || '删除失败', 'error') } }
  }
  document.getElementById('addAction').onclick = () => openAddSheet(null)

  async function switchPet (newId) { if (newId === petId) return; petId = newId; history.replaceState(null, '', 'tasks.html?petId=' + newId); await refresh() }

  async function init () {
    await A.requireAuth()
    const uid = await D.getUid(); pets = await D.getPets(uid) || []
    petId = new URLSearchParams(location.search).get('petId') || (pets[0] && pets[0].id)
    if (petId) { history.replaceState(null, '', 'tasks.html?petId=' + petId); await refresh() }
  }
  init()
})()
</script>
</body>
</html>
