<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1,user-scalable=no">
<title>追踪反馈 - Nuzzly 毛球镇</title>
<link rel="stylesheet" href="css/common.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
<style>
.edit-shell{width:100%;min-height:100vh;min-height:100dvh;padding-top:var(--safe-top);padding-bottom:calc(100px + var(--safe-bottom));display:flex;flex-direction:column}
.page-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px}
.back-btn{width:40px;height:40px;border-radius:50%;background:var(--card);box-shadow:var(--shadow-card);display:flex;align-items:center;justify-content:center;border:1px solid var(--border);cursor:pointer}
.back-btn:active{transform:scale(.92)}
.back-btn svg{width:20px;height:20px;color:var(--fg)}
.page-title{font-family:var(--font-display);font-size:18px;font-weight:600;flex:1;text-align:center}
.context-bar{display:flex;align-items:center;gap:6px;padding:0 20px 12px;font-size:12px;color:var(--muted);flex-wrap:wrap}
.ctx-product{color:var(--brown);font-weight:600}
.ctx-day{color:var(--brown);font-weight:600}
.progress-bar{padding:0 20px 16px}
.progress-track{height:3px;background:rgba(0,0,0,.06);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--brown);border-radius:2px;transition:width .3s}
.progress-steps{display:flex;justify-content:space-between;margin-top:8px}
.progress-steps span{font-size:10px;color:var(--muted);display:flex;align-items:center;gap:2px;font-weight:500}
.progress-steps span.active{color:var(--brown);font-weight:600}
.progress-steps span.done{color:var(--green)}
.progress-steps svg{width:10px;height:10px}
.edit-body{flex:1;padding:0 20px;overflow-y:auto}
.step-emoji{font-size:48px;text-align:center;margin:8px 0 16px}
.step-title{font-size:22px;font-weight:700;color:var(--fg);text-align:center;margin-bottom:6px;letter-spacing:-.01em}
.step-sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:24px}
.opt-list{display:flex;flex-direction:column;gap:10px}
.opt-item{display:flex;align-items:center;gap:14px;padding:16px;border-radius:16px;background:var(--card);border:1.5px solid var(--border);cursor:pointer;transition:all .2s;text-align:left}
.opt-item.active{border-color:var(--brown);background:rgba(139,94,70,.04)}
.opt-item:active{transform:scale(.98)}
.opt-emoji{font-size:28px;flex-shrink:0}
.opt-info{display:flex;flex-direction:column;gap:2px}
.opt-label{font-size:15px;font-weight:600;color:var(--fg)}
.opt-desc{font-size:12px;color:var(--muted)}
.skip-btn{display:block;width:100%;text-align:center;padding:14px;background:transparent;border:none;font-size:13px;color:var(--muted);cursor:pointer;margin-top:8px}
.skip-btn:active{opacity:.6}
.form-group{margin-top:20px}
.form-label{display:block;font-size:13px;font-weight:600;color:var(--fg);margin-bottom:8px}
.form-textarea{width:100%;padding:12px 14px;border-radius:12px;background:var(--card);border:1.5px solid var(--border);font-size:14px;color:var(--fg);outline:none;resize:none;font-family:var(--font-body);transition:border-color .2s;box-sizing:border-box}
.form-textarea:focus{border-color:var(--brown)}
.edit-footer{display:flex;gap:12px;padding:16px 20px;background:rgba(245,243,241,.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.footer-btn{flex:1;height:48px;border-radius:var(--radius-btn);font-size:15px;font-weight:600;cursor:pointer;border:none;transition:transform .15s}
.footer-btn:active{transform:scale(.97)}
.footer-btn.primary{background:var(--brown);color:#fff;box-shadow:var(--shadow-btn)}
.footer-btn.ghost{background:var(--card);color:var(--fg);border:1px solid var(--border)}
.footer-btn:disabled{opacity:.4;cursor:not-allowed}
.loading-state{padding:20px}
.shimmer-block{height:300px;border-radius:24px;background:linear-gradient(90deg,rgba(0,0,0,.04) 25%,rgba(0,0,0,.08) 37%,rgba(0,0,0,.04) 63%);background-size:400% 100%;animation:shimmer 1.4s ease infinite}
@keyframes shimmer{0%{background-position:100% 0}100%{background-position:0 0}}
.empty-state{text-align:center;padding:60px 20px}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-text{font-size:16px;color:var(--fg);margin-bottom:16px}
.empty-action{padding:8px 20px;border-radius:var(--radius-btn);background:var(--brown);color:#fff;border:none;font-size:13px;font-weight:500;cursor:pointer}
.toast{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%) scale(.9);background:rgba(0,0,0,.78);color:#fff;padding:12px 20px;border-radius:12px;font-size:14px;z-index:9999;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;max-width:80%;text-align:center}
.toast.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
</style>
</head>
<body>
<div class="edit-shell">
  <header class="page-header">
    <button class="back-btn" id="backBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button>
    <h1 class="page-title">追踪反馈</h1><span style="width:40px"></span>
  </header>
  <div id="body"></div>
</div>
<div id="toast" class="toast"></div>
<script>
(function () {
  const sb = window.sb, D = window.NuzzlyData, A = window.NuzzlyApp
  const scheduleId = new URLSearchParams(location.search).get('id') || ''
  const STEP_LABELS = ['排便', '毛发', '精神', '喂食', '复购']
  const IMPROVE_OPTS = [{ value: 'improved', emoji: '🙂', label: '很好', desc: '成型正常，无异味加重' }, { value: 'unchanged', emoji: '😐', label: '一般', desc: '和之前差不多' }, { value: 'worsened', emoji: '😞', label: '不好', desc: '软便、腹泻或便秘' }]
  const COAT_OPTS = [{ value: 'improved', emoji: '✨', label: '更好了', desc: '毛发更亮、更顺滑' }, { value: 'unchanged', emoji: '😐', label: '没变化', desc: '和之前一样' }, { value: 'worsened', emoji: '😞', label: '更差了', desc: '干燥、掉毛增多' }]
  const ENERGY_OPTS = [{ value: 'improved', emoji: '⚡', label: '活跃', desc: '比之前更有精力' }, { value: 'unchanged', emoji: '😐', label: '正常', desc: '和平时一样' }, { value: 'worsened', emoji: '😴', label: '低迷', desc: '比之前更懒散' }]
  const REPURCHASE_OPTS = [{ value: 'will_repurchase', emoji: '❤️', label: '会复购', desc: '愿意再次购买' }, { value: 'undecided', emoji: '🤔', label: '不确定', desc: '还在考虑' }, { value: 'will_not', emoji: '❌', label: '不会复购', desc: '不会再买' }]
  let schedule = null, loading = true, step = 1, submitting = false
  const form = { stool_status: '', coat_status: '', energy_status: '', continued_usage: null, repurchase_intent: '', health_notes: '' }
  function toast (msg, theme) { const el = document.getElementById('toast'); el.textContent = msg; el.className = 'toast show ' + (theme || 'success'); clearTimeout(window.__t); window.__t = setTimeout(() => { el.className = 'toast' }, 2200) }
  function esc (s) { return String(s == null ? '' : s).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c])) }
  function productName () { return schedule?.product_reviews?.products?.name || '该产品' }
  function petName () { return schedule?.product_reviews?.pets?.name || '宠物' }
  function canNext () { if (step === 1) return !!form.stool_status; if (step === 2) return !!form.coat_status; if (step === 3) return !!form.energy_status; if (step === 4) return form.continued_usage !== null; return true }
  function pick (key, value) { form[key] = value; renderBody(); renderFooter(); if (step < 5) setTimeout(() => { step++; renderAll() }, 200) }

  async function fetchSchedule (id) {
    const { data, error } = await sb.from('review_followup_schedules').select('id,review_id,profile_id,followup_day,due_date,status,completed_at,created_at,product_reviews!inner(id,product_id,pet_id,products!inner(name,brand,image_url),pets!inner(name,breed,species,stomach_health))').eq('id', id).maybeSingle()
    if (error) { console.warn('[followup-create]', error.message); return null }
    return data
  }
  async function handleSubmit () {
    if (submitting) return
    submitting = true; renderFooter()
    try {
      const uid = await D.getUid()
      const record = { schedule_id: scheduleId, profile_id: uid, stool_status: form.stool_status || null, coat_status: form.coat_status || null, energy_status: form.energy_status || null, continued_usage: form.continued_usage ?? null, repurchase_intent: form.repurchase_intent || null, overall_satisfaction: null, health_notes: form.health_notes || null }
      const { error } = await sb.from('review_followup_entries').insert(record).select().single()
      if (error) throw new Error(error.message)
      await sb.from('review_followup_schedules').update({ status: 'completed', completed_at: new Date().toISOString() }).eq('id', scheduleId)
      toast('Day ' + schedule.followup_day + ' 追踪反馈已提交！')
      setTimeout(() => location.replace('followups.html'), 1500)
    } catch (e) { toast(e.message || '提交失败', 'error'); submitting = false; renderFooter() }
  }

  function renderProgress () { document.getElementById('progFill').style.width = (step / 5 * 100) + '%'; document.getElementById('progSteps').innerHTML = STEP_LABELS.map((label, i) => { const n = i + 1; const cls = step === n ? 'active' : step > n ? 'done' : ''; const inner = step > n ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>' : n; return '<span class="' + cls + '">' + inner + '</span>' }).join('') }
  function renderBody () {
    let html = ''
    if (step === 1) html = '<div class="step-emoji">💩</div><h2 class="step-title">排便情况如何？</h2><p class="step-sub">使用 ' + esc(productName()) + ' 后，' + esc(petName()) + ' 的排便状况</p><div class="opt-list">' + IMPROVE_OPTS.map(o => optItem(o, form.stool_status === o.value, "pick('stool_status','" + o.value + "')")).join('') + '</div><button class="skip-btn" onclick="pick(\'stool_status\',\'not_applicable\')">跳过此问题</button>'
    else if (step === 2) html = '<div class="step-emoji">✨</div><h2 class="step-title">毛发变化如何？</h2><p class="step-sub">使用后的毛发状态变化</p><div class="opt-list">' + COAT_OPTS.map(o => optItem(o, form.coat_status === o.value, "pick('coat_status','" + o.value + "')")).join('') + '</div><button class="skip-btn" onclick="pick(\'coat_status\',\'not_applicable\')">跳过此问题</button>'
    else if (step === 3) html = '<div class="step-emoji">⚡</div><h2 class="step-title">精神状态如何？</h2><p class="step-sub">宠物的精力和活跃程度</p><div class="opt-list">' + ENERGY_OPTS.map(o => optItem(o, form.energy_status === o.value, "pick('energy_status','" + o.value + "')")).join('') + '</div><button class="skip-btn" onclick="pick(\'energy_status\',\'not_applicable\')">跳过此问题</button>'
    else if (step === 4) html = '<div class="step-emoji">🍽️</div><h2 class="step-title">是否继续喂食？</h2><p class="step-sub">你会继续给 ' + esc(petName()) + ' 吃 ' + esc(productName()) + ' 吗？</p><div class="opt-list"><div class="opt-item' + (form.continued_usage === true ? ' active' : '') + '" onclick="pick(\'continued_usage\',true)"><span class="opt-emoji">✅</span><div class="opt-info"><span class="opt-label">是，继续喂食</span></div></div><div class="opt-item' + (form.continued_usage === false ? ' active' : '') + '" onclick="pick(\'continued_usage\',false)"><span class="opt-emoji">❌</span><div class="opt-info"><span class="opt-label">不，已经停了</span></div></div></div>'
    else if (step === 5) html = '<div class="step-emoji">❤️</div><h2 class="step-title">是否愿意复购？</h2><p class="step-sub">你会再次购买这个产品吗？</p><div class="opt-list">' + REPURCHASE_OPTS.map(o => optItem(o, form.repurchase_intent === o.value, "pick('repurchase_intent','" + o.value + "',true)")).join('') + '</div><div class="form-group"><label class="form-label">还有什么想补充的吗？（可选）</label><textarea id="f_notes" class="form-textarea" rows="3" placeholder="补充说明…">' + esc(form.health_notes) + '</textarea></div>'
    document.getElementById('stepBody').innerHTML = html
    const fn = document.getElementById('f_notes'); if (fn) fn.oninput = e => form.health_notes = e.target.value
  }
  function optItem (o, active, onclick) { return '<div class="opt-item' + (active ? ' active' : '') + '" onclick="' + onclick + '"><span class="opt-emoji">' + o.emoji + '</span><div class="opt-info"><span class="opt-label">' + o.label + '</span>' + (o.desc ? '<span class="opt-desc">' + o.desc + '</span>' : '') + '</div></div>' }
  function renderFooter () {
    let html = ''
    if (step > 1) html += '<button class="footer-btn ghost" id="prevBtn">上一步</button>'
    if (step < 5) html += '<button class="footer-btn primary" id="nextBtn"' + (canNext() ? '' : ' disabled') + '>下一步</button>'
    else html += '<button class="footer-btn primary" id="submitBtn"' + (submitting ? ' disabled' : '') + '>' + (submitting ? '提交中…' : '提交追踪反馈') + '</button>'
    document.getElementById('footer').innerHTML = html
    const prev = document.getElementById('prevBtn'); if (prev) prev.onclick = () => { step--; renderAll() }
    const next = document.getElementById('nextBtn'); if (next) next.onclick = () => { if (canNext()) { step++; renderAll() } }
    const sub = document.getElementById('submitBtn'); if (sub) sub.onclick = handleSubmit
  }
  function renderAll () { renderProgress(); renderBody(); renderFooter() }
  window.pick = function (key, value, noAuto) { form[key] = value; renderBody(); renderFooter(); if (!noAuto && step < 5) setTimeout(() => { step++; renderAll() }, 200) }
  document.getElementById('backBtn').onclick = () => { if (step > 1) { step--; renderAll() } else history.back() }

  async function init () {
    await A.requireAuth()
    if (!scheduleId) { toast('缺少追踪参数', 'error'); setTimeout(() => history.back(), 1200); return }
    schedule = await fetchSchedule(scheduleId)
    loading = false
    if (!schedule) { document.getElementById('body').innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-text">追踪计划不存在</div><button class="empty-action" onclick="location.replace(\'followups.html\')">返回列表</button></div>'; return }
    document.getElementById('body').innerHTML = '<div class="context-bar"><span class="ctx-product">' + esc(productName()) + '</span><span class="ctx-sep">·</span><span class="ctx-pet">' + esc(petName()) + '</span><span class="ctx-sep">·</span><span class="ctx-day">Day ' + schedule.followup_day + '</span></div><div class="progress-bar"><div class="progress-track"><div class="progress-fill" id="progFill"></div></div><div class="progress-steps" id="progSteps"></div></div><div class="edit-body" id="stepBody"></div><footer class="edit-footer" id="footer"></footer>'
    renderAll()
  }
  init()
})()
</script>
</body>
</html>
