<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1,user-scalable=no">
<title>设置 - Nuzzly 毛球镇</title>
<link rel="stylesheet" href="css/common.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
<style>
.settings-shell{width:100%;min-height:100vh;min-height:100dvh;background:var(--bg);padding-top:var(--safe-top)}
.settings-header{display:flex;align-items:center;padding:12px 16px;gap:12px}
.back-btn{width:40px;height:40px;border-radius:50%;background:var(--card);box-shadow:var(--shadow-card);display:flex;align-items:center;justify-content:center;border:1px solid var(--border);cursor:pointer;transition:transform .2s}
.back-btn:active{transform:scale(.92)}
.back-btn svg{width:20px;height:20px;color:var(--fg)}
.settings-title{font-family:var(--font-display);font-size:18px;font-weight:600;flex:1;text-align:center;margin-right:40px}
.settings-body{padding:0 16px 40px}
.settings-group{background:var(--card);border-radius:12px;margin-bottom:12px;overflow:hidden}
.settings-group-title{font-size:13px;color:var(--muted);padding:16px 16px 8px;letter-spacing:.01em}
.settings-cell{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
.settings-cell:last-child{border-bottom:none}
.settings-cell:active{background:rgba(0,0,0,.03)}
.settings-cell span{font-size:16px;color:var(--fg)}
.settings-cell svg{width:16px;height:16px;color:var(--muted)}
.logout-btn{width:100%;height:48px;border-radius:var(--radius-btn);background:var(--card);border:1px solid var(--border);font-size:16px;color:#FF3B30;font-weight:500;cursor:pointer;transition:background .15s;margin-top:8px}
.logout-btn:active{background:rgba(255,59,48,.05)}
</style>
</head>
<body>
<div class="settings-shell">
  <header class="settings-header">
    <button class="back-btn" onclick="history.back()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button>
    <h1 class="settings-title">设置</h1>
  </header>
  <div class="settings-body">
    <div class="settings-group">
      <div class="settings-group-title">账号与资料</div>
      <div class="settings-cell" onclick="location.href='settingsSub.html?type=account'"><span>账号与安全</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg></div>
      <div class="settings-cell" onclick="location.href='settingsSub.html?type=pets'"><span>宠物档案</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg></div>
    </div>
    <div class="settings-group">
      <div class="settings-group-title">会员</div>
      <div class="settings-cell" onclick="location.href='settingsSub.html?type=membership'"><span>会员</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg></div>
    </div>
    <div class="settings-group">
      <div class="settings-group-title">显示与语言</div>
      <div class="settings-cell" onclick="location.href='settingsSub.html?type=language'"><span>语言</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg></div>
      <div class="settings-cell" onclick="location.href='settingsSub.html?type=fontsize'"><span>文字大小</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg></div>
    </div>
    <div class="settings-group">
      <div class="settings-group-title">基础</div>
      <div class="settings-cell" onclick="location.href='settingsSub.html?type=notification'"><span>通知</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg></div>
      <div class="settings-cell" onclick="location.href='settingsSub.html?type=general'"><span>通用</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg></div>
      <div class="settings-cell" onclick="location.href='settingsSub.html?type=privacy'"><span>隐私</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg></div>
    </div>
    <div class="settings-group">
      <div class="settings-group-title">内容与社交</div>
      <div class="settings-cell" onclick="location.href='settingsSub.html?type=content'"><span>我的内容</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg></div>
      <div class="settings-cell" onclick="location.href='settingsSub.html?type=interaction'"><span>互动设置</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg></div>
    </div>
    <div class="settings-group">
      <div class="settings-group-title">其他</div>
      <div class="settings-cell" onclick="location.href='settingsSub.html?type=about'"><span>关于我们</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg></div>
      <div class="settings-cell" onclick="location.href='settingsSub.html?type=feedback'"><span>帮助与反馈</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg></div>
    </div>
    <button class="logout-btn" id="logout">退出登录</button>
  </div>
</div>
<script>
(async function () {
  const A = window.NuzzlyApp
  await A.requireAuth()
  document.getElementById('logout').onclick = async function () {
    if (!confirm('确定要退出登录吗？')) return
    await window.NuzzlyData.signOut()
    location.replace('login.html')
  }
})()
</script>
</body>
</html>
