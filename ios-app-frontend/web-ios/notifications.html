<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1,user-scalable=no">
<title>通知中心 - Nuzzly 毛球镇</title>
<link rel="stylesheet" href="css/common.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
<style>
.app-shell{width:100%;min-height:100vh;min-height:100dvh;padding-top:var(--safe-top);padding-bottom:calc(88px + var(--safe-bottom));overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.header{position:relative;padding:4px 24px 0;z-index:1}
.header-row{display:flex;align-items:center;justify-content:space-between}
.back-btn{width:36px;height:36px;border-radius:50%;background:var(--card);box-shadow:var(--shadow-card);display:flex;align-items:center;justify-content:center;border:1px solid var(--border);cursor:pointer;transition:transform .2s;flex-shrink:0}
.back-btn:active{transform:scale(.9)}
.back-btn svg{width:18px;height:18px;color:var(--fg)}
.page-title{font-family:var(--font-display);font-size:20px;font-weight:700;color:var(--fg)}
.mark-all{font-size:13px;color:var(--brown);font-weight:500;cursor:pointer;background:none;border:none;padding:4px 8px}
.mark-all.done{color:var(--muted);cursor:default}
.subtitle{display:flex;align-items:center;justify-content:space-between;padding:16px 24px 0;font-size:14px;color:var(--muted)}
.total{font-size:12px;color:var(--muted);background:rgba(0,0,0,.04);padding:3px 10px;border-radius:var(--radius-btn)}
.list-body{padding:16px 20px;display:flex;flex-direction:column;gap:10px}
.notif-card{display:flex;align-items:flex-start;gap:12px;padding:14px;border-radius:20px;background:rgba(0,0,0,.03);cursor:pointer;transition:transform .15s}
.notif-card:active{transform:scale(.98)}
.notif-card.unread{background:var(--card);box-shadow:0 2px 12px rgba(0,0,0,.05);border:1px solid var(--border)}
.notif-icon{width:36px;height:36px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px}
.notif-icon svg{width:18px;height:18px}
.notif-icon.followup_reminder{background:rgba(255,122,89,.1);color:#FF7A59}
.notif-icon.followup_overdue{background:rgba(255,59,48,.1);color:#FF3B30}
.notif-icon.review_published{background:rgba(108,138,105,.1);color:#6C8A69}
.notif-icon.trust_score_change{background:rgba(123,167,188,.1);color:#7BA7BC}
.notif-icon:not(.followup_reminder):not(.followup_overdue):not(.review_published):not(.trust_score_change){background:rgba(139,94,70,.1);color:var(--brown)}
.notif-content{flex:1;min-width:0}
.notif-title{font-size:14px;color:var(--fg);line-height:1.4}
.notif-title.bold{font-weight:600}
.notif-body{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.notif-time{font-size:11px;color:var(--muted);margin-top:6px;opacity:.6}
.unread-dot{width:8px;height:8px;border-radius:50%;background:var(--brown);flex-shrink:0;margin-top:6px}
.shimmer{background:linear-gradient(90deg,rgba(0,0,0,.04) 25%,rgba(0,0,0,.08) 37%,rgba(0,0,0,.04) 63%);background-size:400% 100%;animation:shimmer 1.4s ease infinite}
@keyframes shimmer{0%{background-position:100% 0}100%{background-position:0 0}}
.shimmer-line{height:12px;border-radius:6px;margin-bottom:8px;background:linear-gradient(90deg,rgba(0,0,0,.04) 25%,rgba(0,0,0,.08) 37%,rgba(0,0,0,.04) 63%);background-size:400% 100%;animation:shimmer 1.4s ease infinite}
.shimmer-line.w70{width:70%}.shimmer-line.w90{width:90%}
.empty-state{display:flex;flex-direction:column;align-items:center;padding:80px 20px;gap:8px}
.empty-icon{font-size:48px}
.empty-text{font-size:14px;color:var(--muted)}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.anim-fade-up{opacity:0;animation:fadeUp .6s cubic-bezier(.22,1,.36,1) forwards}
.anim-delay-1{animation-delay:.1s}.anim-delay-2{animation-delay:.2s}
</style>
</head>
<body>
<div class="app-shell">
  <header class="header anim-fade-up">
    <div class="header-row">
      <button class="back-btn" aria-label="返回" onclick="history.back()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <h1 class="page-title">通知中心</h1>
      <button class="mark-all" id="markAll">全部已读</button>
    </div>
  </header>
  <div class="subtitle anim-fade-up anim-delay-1">
    <span id="subText">所有通知已读</span>
    <span class="total" id="subTotal">共 0 条</span>
  </div>
  <div class="list-body" id="listBody"></div>
</div>
<script>
(function () {
  const sb = window.sb
  const A = window.NuzzlyApp
  const D = window.NuzzlyData
  const state = { notifications: [], loading: true, unreadCount: 0 }

  function esc (s) { return String(s == null ? '' : s).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c])) }
  function formatTime (ts) { if (!ts) return ''; const d = new Date(ts); const diff = Date.now() - d.getTime(); if (diff < 60000) return '刚刚'; if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前'; if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前'; return d.toLocaleDateString('zh-CN', { month: '2-digit', day: '2-digit' }) }
  function iconFor (type) {
    if (type === 'followup_reminder') return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>'
    if (type === 'followup_overdue') return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>'
    if (type === 'review_published') return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>'
    return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>'
  }
  function convertActionUrl (u) {
    if (!u) return ''
    let m = u.match(/^\/products\/(.+)$/); if (m) return 'product-detail.html?id=' + m[1]
    m = u.match(/^\/community/); if (m) return 'community.html'
    m = u.match(/^\/ai/); if (m) return 'aihub.html'
    m = u.match(/^\/pets\/([^/]+)$/); if (m) return 'pet-edit.html?id=' + m[1]
    return ''
  }

  async function init () {
    await A.requireAuth()
    const uid = await D.getUid()
    const { data } = await sb.from('notifications').select('id,title,body,type,action_url,is_read,created_at').eq('profile_id', uid).order('created_at', { ascending: false }).limit(30)
    state.notifications = data || []
    state.unreadCount = state.notifications.filter(n => !n.is_read).length
    state.loading = false
    render()
  }

  function render () {
    document.getElementById('subText').textContent = state.unreadCount > 0 ? '还有 ' + state.unreadCount + ' 条未读' : '所有通知已读'
    document.getElementById('subTotal').textContent = '共 ' + state.notifications.length + ' 条'
    const btn = document.getElementById('markAll')
    if (state.unreadCount > 0) { btn.textContent = '全部已读'; btn.className = 'mark-all' } else { btn.textContent = '已全部读'; btn.className = 'mark-all done' }
    const list = document.getElementById('listBody')
    if (state.loading) { list.innerHTML = Array(4).fill('<div class="notif-card skeleton"><div class="notif-icon shimmer"></div><div class="notif-content"><div class="shimmer-line w70"></div><div class="shimmer-line w90"></div></div></div>').join(''); return }
    if (!state.notifications.length) { list.innerHTML = '<div class="empty-state"><div class="empty-icon">🔔</div><div class="empty-text">暂无通知</div><div class="empty-text" style="font-size:12px">当有新的追踪提醒或系统通知时，会在这里显示</div></div>'; return }
    list.innerHTML = state.notifications.map(n => {
      return '<div class="notif-card' + (n.is_read ? '' : ' unread') + '" onclick="__tapNotif(\'' + n.id + '\',\'' + esc(convertActionUrl(n.action_url)) + '\')"><div class="notif-icon ' + esc(n.type || '') + '">' + iconFor(n.type) + '</div><div class="notif-content"><div class="notif-title' + (n.is_read ? '' : ' bold') + '">' + esc(n.title) + '</div>' + (n.body ? '<div class="notif-body">' + esc(n.body) + '</div>' : '') + '<div class="notif-time">' + formatTime(n.created_at) + '</div></div>' + (n.is_read ? '' : '<div class="unread-dot"></div>') + '</div>'
    }).join('')
  }

  window.__tapNotif = async function (id, url) {
    await sb.from('notifications').update({ is_read: true }).eq('id', id)
    const n = state.notifications.find(x => x.id === id)
    if (n) { n.is_read = true; state.unreadCount = state.notifications.filter(x => !x.is_read).length; render() }
    if (url) location.href = url
  }

  document.getElementById('markAll').onclick = async function () {
    if (state.unreadCount === 0) return
    const uid = await D.getUid()
    await sb.from('notifications').update({ is_read: true }).eq('profile_id', uid).eq('is_read', false)
    state.notifications.forEach(n => { n.is_read = true })
    state.unreadCount = 0
    render()
  }

  init()
})()
</script>
</body>
</html>
