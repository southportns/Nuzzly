<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1,user-scalable=no">
<title>提交使用反馈 - Nuzzly 毛球镇</title>
<link rel="stylesheet" href="css/common.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
<style>
.edit-shell{width:100%;min-height:100vh;min-height:100dvh;padding-top:var(--safe-top);padding-bottom:calc(100px + var(--safe-bottom));display:flex;flex-direction:column}
.page-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px}
.back-btn{width:40px;height:40px;border-radius:50%;background:var(--card);box-shadow:var(--shadow-card);display:flex;align-items:center;justify-content:center;border:1px solid var(--border);cursor:pointer}
.back-btn:active{transform:scale(.92)}
.back-btn svg{width:20px;height:20px;color:var(--fg)}
.page-title{font-family:var(--font-display);font-size:18px;font-weight:600;flex:1;text-align:center}
.progress-bar{padding:0 20px 16px}
.progress-track{height:3px;background:rgba(0,0,0,.06);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--brown);border-radius:2px;transition:width .3s}
.progress-steps{display:flex;justify-content:space-between;margin-top:8px}
.progress-steps span{font-size:10px;color:var(--muted);display:flex;align-items:center;gap:2px;font-weight:500}
.progress-steps span.active{color:var(--brown);font-weight:600}
.progress-steps span.done{color:var(--green)}
.progress-steps svg{width:10px;height:10px}
.edit-body{flex:1;padding:0 20px;overflow-y:auto}
.step-title{font-size:20px;font-weight:700;color:var(--fg);margin-bottom:6px;letter-spacing:-.01em}
.step-sub{font-size:13px;color:var(--muted);margin-bottom:20px}
.duration-list{display:flex;flex-direction:column;gap:10px}
.duration-item{display:flex;align-items:center;justify-content:space-between;padding:16px;border-radius:16px;background:var(--card);border:1.5px solid var(--border);cursor:pointer;transition:all .2s;text-align:left}
.duration-item.active{border-color:var(--brown);background:rgba(139,94,70,.04)}
.duration-item:active{transform:scale(.98)}
.dur-info{display:flex;flex-direction:column;gap:2px}
.dur-label{font-size:15px;font-weight:600;color:var(--fg)}
.dur-days{font-size:11px;color:var(--muted)}
.dur-trust{font-size:11px;color:var(--brown);background:rgba(139,94,70,.08);padding:4px 10px;border-radius:var(--radius-btn);white-space:nowrap}
.custom-days{margin-top:16px;padding:16px;border-radius:16px;background:rgba(0,0,0,.03);border:1px solid var(--border)}
.form-label{display:block;font-size:13px;font-weight:600;color:var(--fg);margin-bottom:8px}
.form-input{width:100%;height:44px;padding:0 14px;border-radius:12px;background:var(--card);border:1.5px solid var(--border);font-size:15px;color:var(--fg);outline:none;transition:border-color .2s;box-sizing:border-box}
.form-input:focus{border-color:var(--brown)}
.form-textarea{width:100%;padding:12px 14px;border-radius:12px;background:var(--card);border:1.5px solid var(--border);font-size:15px;color:var(--fg);outline:none;resize:none;font-family:var(--font-body);transition:border-color .2s;box-sizing:border-box}
.form-textarea:focus{border-color:var(--brown)}
.form-hint{display:block;font-size:11px;color:var(--muted);margin-top:6px}
.form-group{margin-bottom:16px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.pet-list{display:flex;flex-direction:column;gap:10px}
.pet-item{display:flex;align-items:center;gap:12px;padding:14px;border-radius:16px;background:var(--card);border:1.5px solid var(--border);cursor:pointer;transition:all .2s;text-align:left}
.pet-item.active{border-color:var(--brown);background:rgba(139,94,70,.04)}
.pet-avatar{width:40px;height:40px;border-radius:50%;background:rgba(139,94,70,.08);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.pet-meta{display:flex;flex-direction:column;gap:2px}
.pet-name{font-size:15px;font-weight:600;color:var(--fg)}
.pet-breed{font-size:11px;color:var(--muted)}
.empty-mini{text-align:center;padding:40px 20px}
.empty-mini p{font-size:14px;color:var(--muted);margin-bottom:12px}
.link-btn{padding:8px 20px;border-radius:var(--radius-btn);background:var(--brown);color:#fff;border:none;font-size:13px;font-weight:500;cursor:pointer}
.rating-list{display:flex;flex-direction:column;gap:20px}
.rating-row{display:flex;align-items:center;justify-content:space-between;gap:12px}
.rating-info{flex:1}
.rating-label{font-size:14px;font-weight:600;color:var(--fg);margin-bottom:2px}
.rating-desc{font-size:11px;color:var(--muted)}
.rating-stars{display:flex;gap:4px}
.rating-stars .star{width:24px;height:24px;color:#E0E0E0;cursor:pointer;transition:transform .15s}
.rating-stars .star.active{color:#FF9500}
.rating-stars .star:active{transform:scale(1.2)}
.chip-group{display:flex;gap:8px}
.chip{flex:1;text-align:center;padding:12px;border-radius:12px;background:var(--card);border:1.5px solid var(--border);font-size:14px;font-weight:500;color:var(--fg);cursor:pointer;transition:all .2s}
.chip.active{border-color:var(--brown);background:rgba(139,94,70,.06);color:var(--brown)}
.verify-row{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:14px;color:var(--fg)}
.verify-row input{width:18px;height:18px;accent-color:var(--brown)}
.voucher-info{padding:24px;border-radius:20px;background:var(--card);border:1px solid var(--border);text-align:center}
.voucher-icon{font-size:40px;margin-bottom:12px}
.voucher-title{font-size:15px;font-weight:600;color:var(--fg);margin-bottom:12px}
.voucher-list{text-align:left;font-size:12px;color:var(--muted);line-height:1.8;list-style:none;margin-bottom:12px}
.voucher-list li{padding-left:16px;position:relative}
.voucher-list li::before{content:'·';position:absolute;left:4px}
.voucher-note{font-size:11px;color:var(--brown);background:rgba(139,94,70,.06);padding:8px 12px;border-radius:8px;margin-top:8px}
.summary-card{background:var(--card);border-radius:20px;padding:16px;border:1px solid var(--border)}
.summary-row{display:flex;justify-content:space-between;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.summary-row:last-child{border-bottom:none;padding-bottom:0}
.summary-row:first-child{padding-top:0}
.summary-key{font-size:13px;color:var(--muted);flex-shrink:0}
.summary-val{font-size:13px;color:var(--fg);font-weight:500;text-align:right;word-break:break-word}
.edit-footer{display:flex;gap:12px;padding:16px 20px;background:rgba(245,243,241,.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.footer-btn{flex:1;height:48px;border-radius:var(--radius-btn);font-size:15px;font-weight:600;cursor:pointer;border:none;transition:transform .15s}
.footer-btn:active{transform:scale(.97)}
.footer-btn.primary{background:var(--brown);color:#fff;box-shadow:var(--shadow-btn)}
.footer-btn.ghost{background:var(--card);color:var(--fg);border:1px solid var(--border)}
.footer-btn:disabled{opacity:.4;cursor:not-allowed}
.toast{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%) scale(.9);background:rgba(0,0,0,.78);color:#fff;padding:12px 20px;border-radius:12px;font-size:14px;z-index:9999;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;max-width:80%;text-align:center}
.toast.show{opacity:1;transform:translate(-50%,-50%) scale(1)}
</style>
</head>
<body>
<div class="edit-shell">
  <header class="page-header">
    <button class="back-btn" id="backBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button>
    <h1 class="page-title">提交使用反馈</h1><span style="width:40px"></span>
  </header>
  <div class="progress-bar"><div class="progress-track"><div class="progress-fill" id="progFill"></div></div><div class="progress-steps" id="progSteps"></div></div>
  <div class="edit-body" id="body"></div>
  <footer class="edit-footer" id="footer"></footer>
</div>
<div id="toast" class="toast"></div>
<script>
(function () {
  const sb = window.sb, D = window.NuzzlyData, A = window.NuzzlyApp
  const SPECIES_EMOJI = { cat: '🐱', dog: '🐶' }
  const STEP_LABELS = ['时长', '宠物', '评分', '详细', '凭证', '提交']
  const DURATION_BUCKETS = [{ value: 'lt_1w', label: '一周以内', days: '1-6天' }, { value: '1w_to_2w', label: '一周到半个月', days: '7-14天' }, { value: '2w_to_1m', label: '半个月到一个月', days: '15-30天' }, { value: '1m_to_3m', label: '一个月到三个月', days: '31-90天' }, { value: 'm6', label: '半年', days: '约180天' }, { value: 'm6_to_1y', label: '半年到一年', days: '180-365天' }, { value: 'gt_1y', label: '一年以上', days: '365天+' }, { value: 'custom', label: '自定义', days: '输入具体天数' }]
  const DURATION_LABELS = { lt_1w: '一周以内', '1w_to_2w': '一周到半个月', '2w_to_1m': '半个月到一个月', '1m_to_3m': '一个月到三个月', m6: '半年', 'm6_to_1y': '半年到一年', gt_1y: '一年以上', custom: '自定义' }
  const RATING_ROWS = [{ key: 'palatability_rating', label: '适口性', desc: '宠物是否爱吃' }, { key: 'stool_rating', label: '排便情况', desc: '便便是否正常' }, { key: 'black_chin_rating', label: '黑下巴', desc: '是否有黑下巴问题', reverse: true }, { key: 'vomit_rating', label: '呕吐', desc: '是否有呕吐问题', reverse: true }, { key: 'tear_stain_rating', label: '泪痕', desc: '泪痕情况', reverse: true }, { key: 'shedding_rating', label: '掉毛', desc: '掉毛情况', reverse: true }, { key: 'coat_rating', label: '毛发改善', desc: '毛发是否有改善' }, { key: 'energy_rating', label: '精神状态', desc: '精力是否充沛' }, { key: 'overall_rating', label: '总体评分', desc: '你的综合评价' }]
  const REPURCHASE_OPTIONS = [{ value: 'true', label: '会复购' }, { value: 'false', label: '不会复购' }]
  const productId = new URLSearchParams(location.search).get('productId') || ''
  let step = 1, pets = [], productName = '', submitting = false
  const form = { usage_duration: '', usage_duration_custom_days: '', pet_id: '', palatability_rating: null, stool_rating: null, coat_rating: null, energy_rating: null, overall_rating: null, black_chin_rating: null, vomit_rating: null, tear_stain_rating: null, shedding_rating: null, would_repurchase: null, review_text: '', pros: '', cons: '', transition_period_days: '', verified_purchase: false }
  function toast (msg, theme) { const el = document.getElementById('toast'); el.textContent = msg; el.className = 'toast show ' + (theme || 'success'); clearTimeout(window.__t); window.__t = setTimeout(() => { el.className = 'toast' }, 2400) }
  function esc (s) { return String(s == null ? '' : s).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c])) }
  function trustLabel (v) { if (v === 'gt_1y' || v === 'm6_to_1y') return '最高可信度'; if (v === 'm6' || v === '1m_to_3m') return '高可信度'; if (v === 'custom') return '按实际天数计分'; return '' }
  function durationLabel () { if (!form.usage_duration) return '-'; let l = DURATION_LABELS[form.usage_duration] || form.usage_duration; if (form.usage_duration === 'custom' && form.usage_duration_custom_days) l += ' (' + form.usage_duration_custom_days + '天)'; return l }
  function selectedPetName () { return (pets.find(p => p.id === form.pet_id) || {}).name || '-' }
  function canNext () { if (step === 1) { if (!form.usage_duration) return false; if (form.usage_duration === 'custom' && (!form.usage_duration_custom_days || Number(form.usage_duration_custom_days) < 1 || Number(form.usage_duration_custom_days) > 3650)) return false; return true } if (step === 2) return !!form.pet_id; return true }

  function renderProgress () {
    document.getElementById('progFill').style.width = (step / 6 * 100) + '%'
    document.getElementById('progSteps').innerHTML = STEP_LABELS.map((label, i) => { const n = i + 1; const cls = step === n ? 'active' : step > n ? 'done' : ''; const inner = step > n ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>' : n; return '<span class="' + cls + '">' + inner + label + '</span>' }).join('')
  }
  function renderBody () {
    let html = ''
    if (step === 1) {
      html = '<h2 class="step-title">你已经使用这款产品多久了？</h2><p class="step-sub">' + esc(productName || '选择产品使用时长') + '</p><div class="duration-list">' + DURATION_BUCKETS.map(d => '<button class="duration-item' + (form.usage_duration === d.value ? ' active' : '') + '" data-v="' + d.value + '"><div class="dur-info"><span class="dur-label">' + d.label + '</span><span class="dur-days">' + d.days + '</span></div>' + (trustLabel(d.value) ? '<span class="dur-trust">' + trustLabel(d.value) + '</span>' : '') + '</button>').join('') + '</div>'
      if (form.usage_duration === 'custom') html += '<div class="custom-days"><label class="form-label">具体使用天数</label><input id="f_cdays" type="number" min="1" max="3650" class="form-input" value="' + esc(form.usage_duration_custom_days) + '" placeholder="例如 45"><span class="form-hint">范围 1 - 3650 天</span></div>'
    } else if (step === 2) {
      html = '<h2 class="step-title">选择使用该产品的宠物</h2><p class="step-sub">基于宠物体质进行精准匹配</p>'
      if (pets.length) html += '<div class="pet-list">' + pets.map(p => '<button class="pet-item' + (form.pet_id === p.id ? ' active' : '') + '" data-pid="' + p.id + '"><div class="pet-avatar">' + (SPECIES_EMOJI[p.species] || '🐾') + '</div><div class="pet-meta"><span class="pet-name">' + esc(p.name) + '</span><span class="pet-breed">' + esc(p.breed || '未知品种') + (p.stomach_health === 'sensitive' ? ' · 肠胃敏感' : '') + '</span></div></button>').join('') + '</div>'
      else html += '<div class="empty-mini"><p>还没有宠物档案</p><button class="link-btn" id="goCreate">创建宠物档案</button></div>'
    } else if (step === 3) {
      html = '<h2 class="step-title">结构化评分</h2><p class="step-sub">请对以下维度进行评分（1=很差, 5=很好）</p><div class="rating-list">' + RATING_ROWS.map(r => '<div class="rating-row"><div class="rating-info"><div class="rating-label">' + r.label + (r.reverse ? ' <span style="font-size:10px;color:var(--muted);font-weight:400">(越少越好)</span>' : '') + '</div><div class="rating-desc">' + r.desc + '</div></div><div class="rating-stars" data-k="' + r.key + '">' + [1, 2, 3, 4, 5].map(i => '<svg class="star' + (form[r.key] >= i ? ' active' : '') + '" data-i="' + i + '" viewBox="0 0 24 24" fill="' + (form[r.key] >= i ? 'currentColor' : 'none') + '" stroke="currentColor" stroke-width="1.5"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>').join('') + '</div></div>').join('') + '</div>'
    } else if (step === 4) {
      html = '<h2 class="step-title">详细反馈</h2><p class="step-sub">写下你的使用体验（可选但推荐，提高评价可信度）</p><div class="form-group"><label class="form-label">评价内容</label><textarea id="f_text" class="form-textarea" rows="4" placeholder="分享一下你家宠物的使用体验，其他铲屎官需要你的真实反馈…">' + esc(form.review_text) + '</textarea></div><div class="form-row"><div class="form-group"><label class="form-label">优点 👍</label><input id="f_pros" class="form-input" value="' + esc(form.pros) + '" placeholder="例如：适口性好，便便正常"></div><div class="form-group"><label class="form-label">缺点 👎</label><input id="f_cons" class="form-input" value="' + esc(form.cons) + '" placeholder="例如：价格偏高"></div></div><div class="form-group"><label class="form-label">换粮过渡期（天）</label><input id="f_trans" type="number" min="0" max="30" class="form-input" value="' + esc(form.transition_period_days) + '" placeholder="如从旧粮切换到新粮用了几天"></div><div class="form-group"><label class="form-label">是否愿意复购？</label><div class="chip-group" id="repChips">' + REPURCHASE_OPTIONS.map(o => '<div class="chip' + (form.would_repurchase === (o.value === 'true') ? ' active' : '') + '" data-v="' + o.value + '">' + o.label + '</div>').join('') + '</div></div><div class="form-group"><label class="verify-row"><input id="f_verify" type="checkbox"' + (form.verified_purchase ? ' checked' : '') + '><span>我已购买并使用过此产品</span></label></div>'
    } else if (step === 5) {
      html = '<h2 class="step-title">上传购买凭证</h2><p class="step-sub">凭证可显著提升评价权重和信任分</p><div class="voucher-info"><div class="voucher-icon">📋</div><p class="voucher-title">凭证说明</p><ul class="voucher-list"><li>购买小票 / 订单截图 / 包装正面照 / 批次号照片</li><li>凭证将由 AI 系统进行真实性验证</li><li>上传凭证可显著提升评价权重和信任分</li></ul><p class="voucher-note">移动端暂不支持凭证上传，可前往网页版上传。本次评价将直接提交。</p></div>'
    } else if (step === 6) {
      html = '<h2 class="step-title">确认提交</h2><p class="step-sub">提交后系统将在 7/14/30/60/90/180 天后提醒你进行长期追踪反馈</p><div class="summary-card"><div class="summary-row"><span class="summary-key">产品</span><span class="summary-val">' + esc(productName || '-') + '</span></div><div class="summary-row"><span class="summary-key">使用时长</span><span class="summary-val">' + esc(durationLabel()) + '</span></div><div class="summary-row"><span class="summary-key">宠物</span><span class="summary-val">' + esc(selectedPetName()) + '</span></div><div class="summary-row"><span class="summary-key">总体评分</span><span class="summary-val">' + (form.overall_rating ? form.overall_rating + ' 星' : '未评分') + '</span></div><div class="summary-row"><span class="summary-key">复购意愿</span><span class="summary-val">' + (form.would_repurchase === true ? '会复购' : form.would_repurchase === false ? '不会复购' : '未选') + '</span></div>' + (form.review_text ? '<div class="summary-row"><span class="summary-key">评价</span><span class="summary-val">' + esc(form.review_text) + '</span></div>' : '') + '</div>'
    }
    document.getElementById('body').innerHTML = html
    bindStep()
  }
  function bindStep () {
    if (step === 1) { document.querySelectorAll('.duration-item').forEach(el => el.onclick = () => { form.usage_duration = el.dataset.v; if (el.dataset.v !== 'custom') step = 2; renderAll() }); const cd = document.getElementById('f_cdays'); if (cd) cd.oninput = e => form.usage_duration_custom_days = e.target.value }
    else if (step === 2) { document.querySelectorAll('.pet-item').forEach(el => el.onclick = () => { form.pet_id = el.dataset.pid; renderAll() }); const gc = document.getElementById('goCreate'); if (gc) gc.onclick = () => location.href = 'pet-create.html' }
    else if (step === 3) { document.querySelectorAll('.rating-stars').forEach(box => { const k = box.dataset.k; box.querySelectorAll('.star').forEach(s => s.onclick = () => { const i = Number(s.dataset.i); form[k] = form[k] === i ? null : i; renderAll() }) }) }
    else if (step === 4) { document.getElementById('f_text').oninput = e => form.review_text = e.target.value; document.getElementById('f_pros').oninput = e => form.pros = e.target.value; document.getElementById('f_cons').oninput = e => form.cons = e.target.value; document.getElementById('f_trans').oninput = e => form.transition_period_days = e.target.value; document.getElementById('f_verify').onchange = e => form.verified_purchase = e.target.checked; document.querySelectorAll('#repChips .chip').forEach(el => el.onclick = () => { form.would_repurchase = el.dataset.v === 'true'; renderAll() }) }
  }
  function renderFooter () {
    let html = ''
    if (step > 1) html += '<button class="footer-btn ghost" id="prevBtn">上一步</button>'
    if (step < 6) html += '<button class="footer-btn primary" id="nextBtn"' + (canNext() ? '' : ' disabled') + '>下一步</button>'
    else html += '<button class="footer-btn primary" id="submitBtn"' + (submitting ? ' disabled' : '') + '>' + (submitting ? '提交中…' : '提交反馈') + '</button>'
    document.getElementById('footer').innerHTML = html
    const prev = document.getElementById('prevBtn'); if (prev) prev.onclick = () => { step--; renderAll() }
    const next = document.getElementById('nextBtn'); if (next) next.onclick = () => { if (canNext()) { step++; renderAll() } }
    const sub = document.getElementById('submitBtn'); if (sub) sub.onclick = handleSubmit
  }
  function renderAll () { renderProgress(); renderBody(); renderFooter() }

  async function handleSubmit () {
    if (submitting) return
    submitting = true; renderFooter()
    try {
      const uid = await D.getUid()
      const record = { product_id: productId, pet_id: form.pet_id, profile_id: uid, usage_duration: form.usage_duration, usage_duration_custom_days: form.usage_duration === 'custom' && form.usage_duration_custom_days ? Number(form.usage_duration_custom_days) : null, palatability_rating: form.palatability_rating ?? null, stool_rating: form.stool_rating ?? null, coat_rating: form.coat_rating ?? null, energy_rating: form.energy_rating ?? null, overall_rating: form.overall_rating ?? null, black_chin_rating: form.black_chin_rating ?? null, vomit_rating: form.vomit_rating ?? null, tear_stain_rating: form.tear_stain_rating ?? null, shedding_rating: form.shedding_rating ?? null, would_repurchase: form.would_repurchase ?? null, review_text: form.review_text || null, pros: form.pros || null, cons: form.cons || null, transition_period_days: form.transition_period_days ? Number(form.transition_period_days) : null, verified_purchase: form.verified_purchase ?? false }
      const { data, error } = await sb.from('product_reviews').insert(record).select().single()
      if (error) throw new Error(error.message)
      fetch('/api/reviews/' + data.id + '/process-timeline', { method: 'POST' }).catch(() => {})
      toast('评价已提交！系统将在 7/14/30/60/90/180 天后提醒你进行长期追踪反馈。')
      setTimeout(() => history.back(), 1600)
    } catch (e) { toast(e.message || '提交失败', 'error'); submitting = false; renderFooter() }
  }
  document.getElementById('backBtn').onclick = () => { if (step > 1) { step--; renderAll() } else history.back() }

  async function init () {
    await A.requireAuth()
    if (!productId) { toast('缺少产品参数', 'error'); setTimeout(() => history.back(), 1200); return }
    const uid = await D.getUid(); pets = await D.getPets(uid) || []
    const { data } = await sb.from('products').select('name').eq('id', productId).maybeSingle()
    if (data) productName = data.name
    renderAll()
  }
  init()
})()
</script>
